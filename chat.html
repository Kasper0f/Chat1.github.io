<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Чат</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --accent: #e8ff00;
    --accent-dim: #b8cc00;
    --text: #e8e8e8;
    --text-muted: #666;
    --msg-mine: #1a1f00;
    --msg-theirs: #1a1a1a;
    --danger: #ff4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  input, textarea { user-select: text; -webkit-user-select: text; }

  html, body {
    height: 100%; height: 100dvh;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    overflow: hidden;
  }

  /* ── LOCK ── */
  .fullscreen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; padding: 32px; gap: 0;
  }
  .lock-logo { font-size: 48px; margin-bottom: 32px; animation: pulse 3s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  .lock-title { font-size: 11px; letter-spacing: 4px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 40px; }
  .lock-input-wrap { width: 100%; max-width: 280px; margin-bottom: 16px; }
  .lock-input, .name-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); font-family: 'IBM Plex Mono', monospace;
    font-size: 16px; padding: 14px 16px; outline: none; letter-spacing: 2px; transition: border-color .2s;
  }
  .lock-input:focus, .name-input:focus { border-color: var(--accent); }
  .lock-input.error { border-color: var(--danger); animation: shake .3s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
  .lock-btn {
    width: 100%; max-width: 280px; background: var(--accent); color: #000; border: none;
    border-radius: 4px; font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600;
    letter-spacing: 3px; text-transform: uppercase; padding: 14px; cursor: pointer;
  }
  .lock-btn:active { background: var(--accent-dim); }
  .lock-error { font-size: 11px; color: var(--danger); letter-spacing: 1px; margin-top: 12px; opacity: 0; transition: opacity .2s; }
  .lock-error.visible { opacity: 1; }
  .name-title { font-size: 11px; letter-spacing: 4px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
  .name-input { max-width: 280px; margin-bottom: 16px; }

  /* ── CHAT ── */
  #chatScreen { display: none; flex-direction: column; height: 100%; height: 100dvh; }

  .chat-header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .header-left { display: flex; flex-direction: column; gap: 2px; }
  .header-title { font-size: 13px; font-weight: 600; letter-spacing: 2px; color: var(--accent); }
  .header-status { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; }
  .header-status .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #444; margin-right: 4px; transition: background .3s; }
  .header-status.online .dot { background: #44ff88; }
  .header-user { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; }

  .messages {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 16px; display: flex; flex-direction: column; gap: 8px; scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── SWIPE ROW ── */
  .msg-row {
    display: flex; position: relative;
    overflow: hidden;
    border-radius: 4px;
    touch-action: pan-y;
  }
  .msg-row.mine  { justify-content: flex-end; }
  .msg-row.theirs { justify-content: flex-start; }

  .msg {
    max-width: 80%; padding: 10px 14px; border-radius: 4px;
    font-size: 14px; line-height: 1.5; word-break: break-word;
    animation: msgIn .2s ease;
    transition: transform .2s ease;
    position: relative; flex-shrink: 0;
  }
  @keyframes msgIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .msg-row.mine  .msg { background: var(--msg-mine);   border: 1px solid #3a4400; border-bottom-right-radius: 0; }
  .msg-row.theirs .msg { background: var(--msg-theirs); border: 1px solid var(--border); border-bottom-left-radius: 0; }

  .msg-name { font-size: 9px; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
  .msg-row.mine .msg-name { color: var(--accent-dim); text-align: right; }
  .msg-text { white-space: pre-wrap; }
  .msg-text.deleted { font-style: italic; color: var(--text-muted); font-size: 12px; }
  .msg-img { max-width: 100%; border-radius: 3px; margin-top: 4px; display: block; cursor: pointer; }
  .msg-footer { display: flex; align-items: center; justify-content: flex-end; gap: 6px; margin-top: 4px; }
  .msg-time { font-size: 9px; color: var(--text-muted); }
  .msg-edited { font-size: 9px; color: var(--text-muted); font-style: italic; }

  /* swipe-revealed actions */
  .msg-actions {
    position: absolute; right: 0; top: 0; bottom: 0;
    display: flex; align-items: stretch;
    transform: translateX(100%);
    transition: transform .2s ease;
    pointer-events: none;
    overflow: hidden;
    border-radius: 0 4px 4px 0;
    z-index: 5;
  }
  .msg-row.open .msg-actions { transform: translateX(0); pointer-events: all; }
  .msg-row.open .msg { transform: translateX(-112px); }

  .act-btn {
    width: 56px; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: .5px;
    padding: 0; transition: filter .15s;
  }
  .act-btn:active { filter: brightness(1.4); }
  .act-btn.edit { background: #1a1040; color: #a090ff; }
  .act-btn.del  { background: #2a0a0a; color: var(--danger); }
  .act-btn svg  { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .system-msg {
    align-self: center; font-size: 10px; color: var(--text-muted);
    letter-spacing: 2px; padding: 4px 10px; border: 1px solid var(--border);
    border-radius: 2px; text-transform: uppercase;
  }

  /* ── INPUT ── */
  .chat-input-area {
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
  }
  .edit-banner {
    display: none; background: #1a1f00; border: 1px solid #3a4400;
    border-radius: 3px; padding: 6px 10px; font-size: 11px; color: var(--accent-dim);
    letter-spacing: 1px; align-items: center; justify-content: space-between;
  }
  .edit-banner.visible { display: flex; }
  .edit-cancel { background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; padding: 0 4px; line-height: 1; }
  .input-row { display: flex; gap: 8px; align-items: flex-end; }
  .img-btn {
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    width: 42px; height: 42px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .img-btn:active { border-color: var(--accent); }
  .img-btn svg { width: 20px; height: 20px; stroke: var(--text-muted); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  #fileInput { display: none; }
  .chat-textarea {
    flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 14px;
    padding: 10px 12px; resize: none; outline: none; max-height: 120px; min-height: 42px;
    line-height: 1.5; transition: border-color .2s;
  }
  .chat-textarea:focus { border-color: var(--accent); }
  .send-btn {
    background: var(--accent); border: none; border-radius: 4px;
    width: 42px; height: 42px; flex-shrink: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .send-btn:active { background: var(--accent-dim); }
  .send-btn svg { width: 18px; height: 18px; stroke: #000; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

  /* ── IMAGE VIEWER ── */
  #imgViewer {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.93);
    z-index: 200; align-items: center; justify-content: center;
  }
  #imgViewer.open { display: flex; }
  #imgViewer img { max-width: 96vw; max-height: 90vh; border-radius: 4px; }
  #imgViewer .vclose {
    position: absolute; top: 16px; right: 16px; background: none; border: none;
    color: #fff; font-size: 28px; cursor: pointer;
  }

  /* ── CONFIG ── */
  #configNotice {
    position: fixed; inset: 0; background: rgba(0,0,0,.92);
    z-index: 300; display: flex; align-items: center; justify-content: center; padding: 16px;
  }
  .config-box {
    background: var(--surface); border: 1px solid var(--accent); border-radius: 6px;
    padding: 24px; width: 100%; max-width: 360px; overflow-y: auto; max-height: 90dvh;
    font-size: 12px; line-height: 1.8;
  }
  .config-box h2 { font-size: 13px; color: var(--accent); letter-spacing: 2px; margin-bottom: 16px; text-transform: uppercase; }
  .config-box .field { margin: 10px 0; display: flex; flex-direction: column; gap: 4px; }
  .config-box label { font-size: 10px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }
  .config-box input {
    background: #111; border: 1px solid var(--border); border-radius: 3px;
    color: var(--text); font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; padding: 8px 10px; outline: none; width: 100%;
  }
  .config-box input:focus { border-color: var(--accent); }
  .config-save {
    width: 100%; background: var(--accent); color: #000; border: none; border-radius: 3px;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase; padding: 12px; cursor: pointer; margin-top: 16px;
  }
</style>
</head>
<body>

<!-- CONFIG -->
<div id="configNotice">
  <div class="config-box">
    <h2>⚙ Настройка Firebase</h2>
    <p style="color:#888;font-size:11px;margin-bottom:16px;">Firebase Console → Project Settings → Web App</p>
    <div class="field"><label>API Key</label><input id="cfg_apiKey" placeholder="AIzaSy..." autocomplete="off"></div>
    <div class="field"><label>Project ID</label><input id="cfg_projectId" placeholder="my-project-id" autocomplete="off"></div>
    <div class="field"><label>Database URL</label><input id="cfg_dbUrl" placeholder="https://...firebaseio.com" autocomplete="off"></div>
    <div class="field"><label>App ID</label><input id="cfg_appId" placeholder="1:000:web:abc" autocomplete="off"></div>
    <div class="field"><label>Пароль чата</label><input id="cfg_password" type="password" placeholder="Придумай пароль" autocomplete="off"></div>
    <button class="config-save" onclick="saveConfig()">СОХРАНИТЬ И ЗАПУСТИТЬ</button>
  </div>
</div>

<!-- LOCK -->
<div id="lockScreen" class="fullscreen" style="display:none">
  <div class="lock-logo">🔒</div>
  <div class="lock-title">Введите пароль для входа</div>
  <div class="lock-input-wrap">
    <input class="lock-input" id="passwordInput" type="password" placeholder="пароль" autocomplete="off"
      onkeydown="if(event.key==='Enter') checkPassword()">
  </div>
  <button class="lock-btn" onclick="checkPassword()">ВОЙТИ</button>
  <div class="lock-error" id="lockError">Неверный пароль</div>
</div>

<!-- NAME -->
<div id="nameScreen" class="fullscreen" style="display:none">
  <div class="lock-logo">✏️</div>
  <div class="name-title">Как тебя зовут?</div>
  <input class="name-input" id="nameInput" type="text" placeholder="Имя или псевдоним" maxlength="20" autocomplete="off"
    onkeydown="if(event.key==='Enter') enterChat()">
  <button class="lock-btn" onclick="enterChat()">В ЧАТ</button>
</div>

<!-- CHAT -->
<div id="chatScreen">
  <div class="chat-header">
    <div class="header-left">
      <div class="header-title">[ ЧАТROOM ]</div>
      <div class="header-status" id="connStatus"><span class="dot"></span><span id="connText">подключение...</span></div>
    </div>
    <div class="header-user" id="headerUser"></div>
  </div>
  <div class="messages" id="messages" onclick="closeAllSwipes()"></div>
  <div class="chat-input-area">
    <div class="edit-banner" id="editBanner">
      <span>✏ Редактирование</span>
      <button class="edit-cancel" onclick="cancelEdit()">✕</button>
    </div>
    <div class="input-row">
      <button class="img-btn" onclick="document.getElementById('fileInput').click()">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </button>
      <input type="file" id="fileInput" accept="image/*" onchange="handleImage(event)">
      <textarea class="chat-textarea" id="msgInput" placeholder="Написать сообщение..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- IMAGE VIEWER -->
<div id="imgViewer">
  <button class="vclose" onclick="closeViewer()">✕</button>
  <img id="viewerImg" src="">
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, onChildAdded, onChildChanged, onChildRemoved, update, set, onDisconnect, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const STORAGE_KEY = 'chatConfig_v1';
const SESSION_KEY = 'chatSession_v1';
let db, myName, chatConfig, editingKey = null;

// ── CONFIG ──
function loadConfig() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; } }

window.saveConfig = function() {
  const cfg = {
    apiKey:      document.getElementById('cfg_apiKey').value.trim(),
    projectId:   document.getElementById('cfg_projectId').value.trim(),
    databaseURL: document.getElementById('cfg_dbUrl').value.trim(),
    appId:       document.getElementById('cfg_appId').value.trim() || 'x',
    password:    document.getElementById('cfg_password').value,
  };
  if (!cfg.apiKey || !cfg.projectId || !cfg.databaseURL || !cfg.password) { alert('Заполни все поля кроме App ID'); return; }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));
  location.reload();
};

// ── AUTH ──
window.checkPassword = function() {
  const val = document.getElementById('passwordInput').value;
  const inEl = document.getElementById('passwordInput');
  const errEl = document.getElementById('lockError');
  hashStr(val).then(h => hashStr(chatConfig.password).then(ch => {
    if (h === ch) {
      const saved = sessionStorage.getItem(SESSION_KEY);
      if (saved) { myName = saved; showChat(); }
      else {
        document.getElementById('lockScreen').style.display = 'none';
        document.getElementById('nameScreen').style.display = 'flex';
        setTimeout(() => document.getElementById('nameInput').focus(), 80);
      }
    } else {
      inEl.classList.add('error'); errEl.classList.add('visible'); inEl.value = '';
      setTimeout(() => { inEl.classList.remove('error'); errEl.classList.remove('visible'); }, 2000);
    }
  }));
};

window.enterChat = function() {
  const n = document.getElementById('nameInput').value.trim();
  if (!n) return;
  myName = n; sessionStorage.setItem(SESSION_KEY, n); showChat();
};

async function hashStr(s) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return [...new Uint8Array(b)].map(x => x.toString(16).padStart(2,'0')).join('');
}

// ── START CHAT ──
function showChat() {
  document.getElementById('nameScreen').style.display = 'none';
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('chatScreen').style.display = 'flex';
  document.getElementById('headerUser').textContent = myName;

  const app = initializeApp({
    apiKey: chatConfig.apiKey, projectId: chatConfig.projectId,
    databaseURL: chatConfig.databaseURL, appId: chatConfig.appId,
    authDomain: `${chatConfig.projectId}.firebaseapp.com`,
  });
  db = getDatabase(app);

  // Presence
  const pRef = ref(db, `presence/${myName.replace(/\W/g,'_')}`);
  set(pRef, { name: myName }); onDisconnect(pRef).remove();
  onValue(ref(db, 'presence'), snap => {
    const n = snap.exists() ? Object.keys(snap.val()).length : 0;
    const el = document.getElementById('connStatus');
    el.classList.toggle('online', n > 0);
    document.getElementById('connText').textContent = n < 1 ? 'нет подключений' : `онлайн: ${n}`;
  });

  // ── MESSAGES (оригинальная рабочая логика) ──
  let firstLoad = true;
  onChildAdded(ref(db, 'messages'), snap => {
    renderMessage(snap.key, snap.val(), firstLoad);
    if (!firstLoad) scrollToBottom();
  });
  onChildChanged(ref(db, 'messages'), snap => updateMessage(snap.key, snap.val()));
  onChildRemoved(ref(db, 'messages'), snap => { document.getElementById(`m-${snap.key}`)?.remove(); });
  setTimeout(() => { firstLoad = false; scrollToBottom(); }, 600);
}

// ── RENDER ──
function renderMessage(key, msg, silent) {
  if (document.getElementById(`m-${key}`)) return;
  const container = document.getElementById('messages');

  if (msg.type === 'system') {
    const el = document.createElement('div');
    el.className = 'system-msg'; el.id = `m-${key}`; el.textContent = msg.text;
    container.appendChild(el); return;
  }

  const mine = msg.name === myName;
  const row = document.createElement('div');
  row.className = `msg-row ${mine ? 'mine' : 'theirs'}`;
  row.id = `m-${key}`;

  // bubble
  const bubble = document.createElement('div');
  bubble.className = 'msg';

  const nameEl = document.createElement('div');
  nameEl.className = 'msg-name'; nameEl.textContent = msg.name;
  bubble.appendChild(nameEl);

  if (msg.img) {
    const img = document.createElement('img');
    img.className = 'msg-img'; img.src = msg.img;
    img.onclick = e => { e.stopPropagation(); openViewer(msg.img); };
    bubble.appendChild(img);
  }

  const txt = document.createElement('div');
  txt.className = msg.deleted ? 'msg-text deleted' : 'msg-text';
  txt.textContent = msg.deleted ? 'Сообщение удалено' : (msg.text || '');
  bubble.appendChild(txt);

  const footer = document.createElement('div');
  footer.className = 'msg-footer';
  if (msg.edited && !msg.deleted) {
    const e = document.createElement('span'); e.className = 'msg-edited'; e.textContent = 'изм.'; footer.appendChild(e);
  }
  const t = document.createElement('span');
  t.className = 'msg-time';
  t.textContent = new Date(msg.ts || msg.timestamp || Date.now()).toLocaleTimeString('ru', {hour:'2-digit',minute:'2-digit'});
  footer.appendChild(t);
  bubble.appendChild(footer);

  row.appendChild(bubble);

  // swipe actions — только свои сообщения
  if (mine) {
    const acts = document.createElement('div');
    acts.className = 'msg-actions';

    const eBtn = document.createElement('button');
    eBtn.className = 'act-btn edit';
    eBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Изм.`;
    eBtn.onclick = e => { e.stopPropagation(); startEdit(key); };

    const dBtn = document.createElement('button');
    dBtn.className = 'act-btn del';
    dBtn.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>Удал.`;
    dBtn.onclick = e => { e.stopPropagation(); deleteMsg(key); };

    acts.appendChild(eBtn); acts.appendChild(dBtn);
    row.appendChild(acts);
    attachSwipe(row);
  }

  container.appendChild(row);
}

function updateMessage(key, msg) {
  const row = document.getElementById(`m-${key}`); if (!row) return;
  const txt = row.querySelector('.msg-text');
  if (txt) { txt.textContent = msg.deleted ? 'Сообщение удалено' : (msg.text || ''); txt.className = msg.deleted ? 'msg-text deleted' : 'msg-text'; }
  const footer = row.querySelector('.msg-footer');
  if (footer && msg.edited && !msg.deleted && !footer.querySelector('.msg-edited')) {
    const e = document.createElement('span'); e.className = 'msg-edited'; e.textContent = 'изм.';
    footer.insertBefore(e, footer.firstChild);
  }
}

// ── SWIPE ──
function attachSwipe(row) {
  let startX, startY, isSwiping = false;
  const OPEN_AT = 50;

  row.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isSwiping = false;
  }, { passive: true });

  row.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (!isSwiping && Math.abs(dy) > Math.abs(dx) + 5) return; // вертикальный скролл
    isSwiping = true;
    const isOpen = row.classList.contains('open');
    // двигаем только влево для открытия, вправо для закрытия
    let offset = isOpen ? (dx < 0 ? 0 : Math.min(dx, 112)) - 112 : Math.max(dx, -112);
    offset = Math.max(-112, Math.min(0, offset));
    row.querySelector('.msg').style.transform = `translateX(${offset}px)`;
    row.querySelector('.msg-actions').style.transform = `translateX(${100 + (offset / 112 * 100)}%)`;
  }, { passive: true });

  row.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    // сброс инлайн-стилей — CSS transition сделает плавно
    row.querySelector('.msg').style.transform = '';
    row.querySelector('.msg-actions').style.transform = '';
    if (!isSwiping) return;
    if (!row.classList.contains('open') && dx < -OPEN_AT) {
      closeAllSwipes(); row.classList.add('open');
    } else if (row.classList.contains('open') && dx > OPEN_AT) {
      row.classList.remove('open');
    }
  });
}

window.closeAllSwipes = function() {
  document.querySelectorAll('.msg-row.open').forEach(r => r.classList.remove('open'));
};

// ── EDIT / DELETE ──
function startEdit(key) {
  closeAllSwipes();
  const row = document.getElementById(`m-${key}`); if (!row) return;
  const txt = row.querySelector('.msg-text');
  if (!txt || txt.classList.contains('deleted')) return;
  editingKey = key;
  const inp = document.getElementById('msgInput');
  inp.value = txt.textContent; autoResize(inp); inp.focus();
  document.getElementById('editBanner').classList.add('visible');
}

window.cancelEdit = function() {
  editingKey = null;
  document.getElementById('msgInput').value = '';
  document.getElementById('msgInput').style.height = 'auto';
  document.getElementById('editBanner').classList.remove('visible');
};

function deleteMsg(key) {
  closeAllSwipes();
  update(ref(db, `messages/${key}`), { text: '', deleted: true, img: null });
}

// ── SEND ──
window.sendMessage = function() {
  const inp = document.getElementById('msgInput');
  const text = inp.value.trim();
  if (!db) return;
  if (editingKey) {
    update(ref(db, `messages/${editingKey}`), { text, edited: true });
    cancelEdit(); return;
  }
  if (!text) return;
  push(ref(db, 'messages'), { name: myName, text, ts: Date.now(), type: 'msg' });
  inp.value = ''; inp.style.height = 'auto'; inp.focus();
};

window.handleImage = function(e) {
  const file = e.target.files[0]; if (!file || !db) return;
  if (file.size > 900000) { alert('Слишком большое фото (макс ~900 КБ)'); return; }
  const r = new FileReader();
  r.onload = ev => push(ref(db, 'messages'), { name: myName, img: ev.target.result, text: '', ts: Date.now(), type: 'msg' });
  r.readAsDataURL(file); e.target.value = '';
};

// ── VIEWER ──
window.openViewer  = src => { document.getElementById('viewerImg').src = src; document.getElementById('imgViewer').classList.add('open'); };
window.closeViewer = ()  => document.getElementById('imgViewer').classList.remove('open');

// ── UTILS ──
window.handleKey   = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
window.autoResize  = el => { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; };
function scrollToBottom() { const c = document.getElementById('messages'); c.scrollTop = c.scrollHeight; }

// ── BOOT ──
chatConfig = loadConfig();
if (!chatConfig) {
  document.getElementById('configNotice').style.display = 'flex';
} else {
  document.getElementById('configNotice').style.display = 'none';
  document.getElementById('lockScreen').style.display = 'flex';
  setTimeout(() => document.getElementById('passwordInput').focus(), 80);
}
</script>
</body>
</html>
