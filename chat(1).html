<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Чат</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c26;
  --border: #252530;
  --accent: #7c6dfa;
  --accent2: #5d50d6;
  --accent-glow: rgba(124,109,250,.18);
  --text: #e4e4f0;
  --text-muted: #5a5a72;
  --text-dim: #8888a8;
  --mine-bg: #1a1730;
  --mine-border: #3d3468;
  --theirs-bg: #161620;
  --danger: #f04060;
  --green: #3ddc84;
  --radius: 16px;
  --radius-sm: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
input, textarea, .msg-text { user-select: text; -webkit-user-select: text; }
html, body { height: 100%; height: 100dvh; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

/* ─── SCREENS ─── */
.screen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 100; padding: 32px; gap: 12px;
}
.screen-icon { font-size: 52px; margin-bottom: 12px; }
.screen-label { font-size: 11px; letter-spacing: 3px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px; }

.field-input {
  width: 100%; max-width: 300px;
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 16px; padding: 14px 18px; outline: none; transition: border-color .2s, box-shadow .2s;
}
.field-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.field-input.shake { animation: shake .35s ease; border-color: var(--danger); }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)} 60%{transform:translateX(8px)} 80%{transform:translateX(-5px)} }

.btn-primary {
  width: 100%; max-width: 300px;
  background: var(--accent); color: #fff; border: none;
  border-radius: var(--radius-sm); font-family: 'Inter', sans-serif;
  font-size: 14px; font-weight: 600; letter-spacing: 1px;
  padding: 15px; cursor: pointer; transition: background .15s, transform .1s, box-shadow .2s;
  box-shadow: 0 4px 20px rgba(124,109,250,.35);
}
.btn-primary:active { transform: scale(.97); background: var(--accent2); }

.err-msg { font-size: 12px; color: var(--danger); opacity: 0; transition: opacity .2s; min-height: 16px; }
.err-msg.show { opacity: 1; }

/* ─── CHAT LAYOUT ─── */
#chatScreen { display: none; flex-direction: column; height: 100%; height: 100dvh; }

.chat-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 18px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
  backdrop-filter: blur(12px);
}
.header-info { display: flex; flex-direction: column; gap: 3px; }
.header-title { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: .3px; }
.header-status { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); transition: background .4s, box-shadow .4s; flex-shrink: 0; }
.status-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
.header-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 600; color: #fff; flex-shrink: 0;
}

/* ─── MESSAGES ─── */
.messages {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 16px 12px; display: flex; flex-direction: column; gap: 6px;
}
.messages::-webkit-scrollbar { width: 3px; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* swipe wrapper */
.msg-row {
  display: flex; position: relative; overflow: hidden;
  border-radius: var(--radius-sm);
  touch-action: pan-y;
}
.msg-row.mine { justify-content: flex-end; }
.msg-row.theirs { justify-content: flex-start; }

/* sliding bubble */
.msg-bubble {
  max-width: 78%; padding: 10px 14px 8px;
  border-radius: var(--radius);
  font-size: 14px; line-height: 1.55; word-break: break-word;
  transition: transform .22s cubic-bezier(.4,0,.2,1);
  will-change: transform; position: relative; flex-shrink: 0;
}
.msg-row.mine .msg-bubble {
  background: var(--mine-bg); border: 1px solid var(--mine-border);
  border-bottom-right-radius: 5px;
}
.msg-row.theirs .msg-bubble {
  background: var(--theirs-bg); border: 1px solid var(--border);
  border-bottom-left-radius: 5px;
}
@keyframes popIn { from{opacity:0;transform:translateY(10px) scale(.96)} to{opacity:1;transform:translateY(0) scale(1)} }
.msg-bubble { animation: popIn .2s ease; }

.msg-sender { font-size: 10px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; margin-bottom: 4px; color: var(--text-muted); }
.msg-row.mine .msg-sender { color: #a78bfa; text-align: right; }
.msg-text { white-space: pre-wrap; color: var(--text); }
.msg-text.deleted { color: var(--text-muted); font-style: italic; font-size: 13px; }
.msg-img { max-width: 100%; border-radius: var(--radius-sm); margin-top: 6px; display: block; cursor: pointer; }
.msg-footer { display: flex; align-items: center; justify-content: flex-end; gap: 5px; margin-top: 5px; }
.msg-time { font-size: 10px; color: var(--text-muted); }
.msg-edited { font-size: 10px; color: var(--text-muted); }
.msg-status { font-size: 11px; color: var(--accent); margin-left: 1px; }

/* swipe action panel — slides in from right */
.msg-actions {
  position: absolute; right: 0; top: 0; bottom: 0;
  display: flex; align-items: stretch;
  transform: translateX(100%);
  transition: transform .22s cubic-bezier(.4,0,.2,1);
  pointer-events: none; z-index: 5;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  overflow: hidden;
}
.msg-row.actions-open .msg-actions { transform: translateX(0); pointer-events: all; }
.msg-row.actions-open .msg-bubble { transform: translateX(-110px); }

.act-btn {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; width: 54px; border: none; cursor: pointer;
  font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 500; letter-spacing: .3px;
  transition: background .15s; padding: 0;
}
.act-btn.edit { background: #2a2060; color: #a78bfa; }
.act-btn.del  { background: #2a1020; color: var(--danger); }
.act-btn:active { filter: brightness(1.3); }
.act-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* system messages */
.system-msg {
  align-self: center; font-size: 10px; letter-spacing: 1.5px; color: var(--text-muted);
  padding: 4px 12px; border: 1px solid var(--border); border-radius: 20px;
  text-transform: uppercase; margin: 4px 0;
}

/* date divider */
.date-divider {
  align-self: center; font-size: 10px; color: var(--text-muted);
  padding: 3px 10px; background: var(--surface2);
  border-radius: 20px; letter-spacing: .5px; margin: 4px 0;
}

/* ─── INPUT ─── */
.chat-footer {
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 10px 12px; flex-shrink: 0;
}
.edit-banner {
  display: none; align-items: center; justify-content: space-between;
  background: var(--mine-bg); border: 1px solid var(--mine-border);
  border-radius: 8px; padding: 7px 12px; margin-bottom: 8px;
  font-size: 11px; color: #a78bfa; letter-spacing: .3px;
}
.edit-banner.show { display: flex; }
.edit-cancel-btn { background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; line-height: 1; padding: 0 2px; }

.input-row { display: flex; gap: 8px; align-items: flex-end; }
.attach-btn {
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 12px; width: 44px; height: 44px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  transition: border-color .2s, background .2s;
}
.attach-btn:active { background: var(--border); border-color: var(--accent); }
.attach-btn svg { width: 20px; height: 20px; stroke: var(--text-dim); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

.msg-input {
  flex: 1; background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 14px; color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 15px; padding: 11px 16px; resize: none; outline: none;
  min-height: 44px; max-height: 130px; line-height: 1.5;
  transition: border-color .2s, box-shadow .2s;
}
.msg-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.msg-input::placeholder { color: var(--text-muted); }

.send-btn {
  background: var(--accent); border: none; border-radius: 12px;
  width: 44px; height: 44px; flex-shrink: 0; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, transform .1s, box-shadow .2s;
  box-shadow: 0 3px 12px rgba(124,109,250,.4);
}
.send-btn:active { transform: scale(.92); background: var(--accent2); }
.send-btn svg { width: 19px; height: 19px; stroke: #fff; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

#fileInput { display: none; }

/* ─── IMAGE VIEWER ─── */
#viewer {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.93); z-index: 500;
  align-items: center; justify-content: center;
}
#viewer.open { display: flex; }
#viewer img { max-width: 96vw; max-height: 90vh; border-radius: 10px; }
#viewer .v-close {
  position: absolute; top: 18px; right: 18px; background: rgba(255,255,255,.12);
  border: none; color: #fff; font-size: 22px; width: 40px; height: 40px;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}

/* ─── CONFIG ─── */
#configScreen {
  position: fixed; inset: 0; background: rgba(0,0,0,.85);
  z-index: 400; display: flex; align-items: center; justify-content: center; padding: 16px;
}
.config-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 28px 24px; width: 100%; max-width: 360px;
  overflow-y: auto; max-height: 92dvh;
}
.config-card h2 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.config-card p { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.6; }
.cfg-field { margin-bottom: 14px; display: flex; flex-direction: column; gap: 5px; }
.cfg-label { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }
.cfg-input {
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 8px; color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 13px; padding: 10px 12px; outline: none; width: 100%; transition: border-color .2s;
}
.cfg-input:focus { border-color: var(--accent); }
</style>
</head>
<body>

<!-- CONFIG -->
<div id="configScreen">
  <div class="config-card">
    <h2>⚙️ Настройка</h2>
    <p>Данные из Firebase Console → Project Settings → Web App</p>
    <div class="cfg-field"><label class="cfg-label">API Key</label><input class="cfg-input" id="c_key" placeholder="AIzaSy..." autocomplete="off"></div>
    <div class="cfg-field"><label class="cfg-label">Project ID</label><input class="cfg-input" id="c_pid" placeholder="my-project-id" autocomplete="off"></div>
    <div class="cfg-field"><label class="cfg-label">Database URL</label><input class="cfg-input" id="c_db" placeholder="https://...firebaseio.com" autocomplete="off"></div>
    <div class="cfg-field"><label class="cfg-label">App ID</label><input class="cfg-input" id="c_app" placeholder="1:000:web:abc" autocomplete="off"></div>
    <div class="cfg-field"><label class="cfg-label">Пароль чата</label><input class="cfg-input" id="c_pass" type="password" placeholder="Придумай пароль" autocomplete="off"></div>
    <button class="btn-primary" style="margin-top:8px" onclick="saveConfig()">Сохранить и запустить</button>
  </div>
</div>

<!-- LOCK -->
<div id="lockScreen" class="screen" style="display:none">
  <div class="screen-icon">🔐</div>
  <div class="screen-label">Введите пароль</div>
  <input class="field-input" id="passInput" type="password" placeholder="Пароль..." autocomplete="off"
    onkeydown="if(event.key==='Enter')checkPass()">
  <button class="btn-primary" onclick="checkPass()">Войти</button>
  <div class="err-msg" id="passErr">Неверный пароль</div>
</div>

<!-- NAME -->
<div id="nameScreen" class="screen" style="display:none">
  <div class="screen-icon">✏️</div>
  <div class="screen-label">Как тебя зовут?</div>
  <input class="field-input" id="nameInput" type="text" placeholder="Твоё имя..." maxlength="20" autocomplete="off"
    onkeydown="if(event.key==='Enter')enterChat()">
  <button class="btn-primary" onclick="enterChat()">В чат →</button>
</div>

<!-- CHAT -->
<div id="chatScreen">
  <div class="chat-header">
    <div class="header-info">
      <div class="header-title">Личный чат</div>
      <div class="header-status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">подключение...</span>
      </div>
    </div>
    <div class="header-avatar" id="headerAvatar">?</div>
  </div>
  <div class="messages" id="messages" onclick="closeAllActions()"></div>
  <div class="chat-footer">
    <div class="edit-banner" id="editBanner">
      <span>✏ Редактирование сообщения</span>
      <button class="edit-cancel-btn" onclick="cancelEdit()">✕</button>
    </div>
    <div class="input-row">
      <button class="attach-btn" onclick="document.getElementById('fileInput').click()">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </button>
      <input type="file" id="fileInput" accept="image/*" onchange="sendImage(event)">
      <textarea class="msg-input" id="msgInput" placeholder="Сообщение..." rows="1"
        onkeydown="onKey(event)" oninput="grow(this)"></textarea>
      <button class="send-btn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- VIEWER -->
<div id="viewer">
  <button class="v-close" onclick="closeViewer()">✕</button>
  <img id="viewerImg" src="">
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, onChildAdded, onChildChanged, onChildRemoved, update, set, onDisconnect, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const CFG_KEY = 'xchat_cfg2';
const SES_KEY = 'xchat_ses';
let db, myName, cfg, editKey = null;

// ── CONFIG ──
function loadCfg() { try { return JSON.parse(localStorage.getItem(CFG_KEY)); } catch { return null; } }

window.saveConfig = () => {
  const c = {
    apiKey: id('c_key').value.trim(),
    projectId: id('c_pid').value.trim(),
    databaseURL: id('c_db').value.trim(),
    appId: id('c_app').value.trim() || 'x',
    password: id('c_pass').value,
  };
  if (!c.apiKey || !c.projectId || !c.databaseURL || !c.password) { alert('Заполни все поля кроме App ID'); return; }
  localStorage.setItem(CFG_KEY, JSON.stringify(c));
  location.reload();
};

// ── AUTH ──
window.checkPass = async () => {
  const val = id('passInput').value;
  const h = await sha256(val), ch = await sha256(cfg.password);
  if (h === ch) {
    const saved = sessionStorage.getItem(SES_KEY);
    if (saved) { myName = saved; startChat(); }
    else { show('lockScreen', false); show('nameScreen', true); setTimeout(() => id('nameInput').focus(), 80); }
  } else {
    id('passInput').classList.add('shake');
    id('passErr').classList.add('show');
    id('passInput').value = '';
    setTimeout(() => { id('passInput').classList.remove('shake'); id('passErr').classList.remove('show'); }, 2000);
  }
};

window.enterChat = () => {
  const n = id('nameInput').value.trim();
  if (!n) return;
  myName = n; sessionStorage.setItem(SES_KEY, n); startChat();
};

async function sha256(s) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return [...new Uint8Array(b)].map(x => x.toString(16).padStart(2,'0')).join('');
}

// ── CHAT START ──
function startChat() {
  show('nameScreen', false); show('lockScreen', false);
  id('chatScreen').style.display = 'flex';
  id('headerAvatar').textContent = myName[0].toUpperCase();

  const app = initializeApp({
    apiKey: cfg.apiKey, projectId: cfg.projectId,
    databaseURL: cfg.databaseURL, appId: cfg.appId,
    authDomain: `${cfg.projectId}.firebaseapp.com`,
  });
  db = getDatabase(app);

  // presence
  const pRef = ref(db, `presence/${slug(myName)}`);
  set(pRef, { name: myName, t: Date.now() });
  onDisconnect(pRef).remove();
  onValue(ref(db, 'presence'), snap => {
    const n = snap.exists() ? Object.keys(snap.val()).length : 0;
    id('statusDot').className = 'status-dot' + (n > 0 ? ' online' : '');
    id('statusText').textContent = n === 0 ? 'нет подключений' : n === 1 ? 'онлайн: 1' : `онлайн: ${n}`;
  });

  // messages
  const msgsRef = ref(db, 'messages');
  const pendingMsgs = [];
  let loaded = false;

  onChildAdded(msgsRef, snap => {
    if (!loaded) { pendingMsgs.push({key: snap.key, val: snap.val()}); return; }
    appendMsg(snap.key, snap.val());
    scrollBot();
  });
  onChildChanged(msgsRef, snap => patchMsg(snap.key, snap.val()));
  onChildRemoved(msgsRef, snap => id(`m-${snap.key}`)?.remove());

  // Wait for initial batch then render all at once in order
  setTimeout(() => {
    loaded = true;
    let prevDate = null;
    pendingMsgs.forEach(({key, val}) => {
      appendMsg(key, val, prevDate);
      prevDate = dateKey(val.ts);
    });
    scrollBot();
    id('msgInput').focus();
  }, 800);
}

// ── RENDER ──
function appendMsg(key, msg, prevDate) {
  if (id(`m-${key}`)) return;
  const c = id('messages');

  // date divider
  const dkey = dateKey(msg.ts);
  if (dkey && dkey !== prevDate) {
    const div = el('div', 'date-divider'); div.textContent = formatDate(msg.ts);
    c.appendChild(div);
  }

  if (msg.type === 'system') {
    const s = el('div', 'system-msg'); s.id = `m-${key}`; s.textContent = msg.text;
    c.appendChild(s); return;
  }

  const mine = msg.name === myName;
  const row = el('div', `msg-row ${mine ? 'mine' : 'theirs'}`);
  row.id = `m-${key}`; row.dataset.key = key;

  const bubble = el('div', 'msg-bubble');

  const sender = el('div', 'msg-sender'); sender.textContent = msg.name; bubble.appendChild(sender);

  if (msg.img) {
    const img = document.createElement('img');
    img.className = 'msg-img'; img.src = msg.img;
    img.onclick = (e) => { e.stopPropagation(); openViewer(msg.img); };
    bubble.appendChild(img);
  }

  const txt = el('div', msg.deleted ? 'msg-text deleted' : 'msg-text');
  txt.textContent = msg.deleted ? 'Сообщение удалено' : (msg.text || '');
  bubble.appendChild(txt);

  const footer = el('div', 'msg-footer');
  if (msg.edited && !msg.deleted) { const e = el('span','msg-edited'); e.textContent = 'изм.'; footer.appendChild(e); }
  const t = el('span','msg-time'); t.textContent = fmtTime(msg.ts); footer.appendChild(t);
  if (mine) { const st = el('span','msg-status'); st.textContent = '✓'; footer.appendChild(st); }
  bubble.appendChild(footer);

  row.appendChild(bubble);

  // swipe actions (only mine)
  if (mine) {
    const acts = el('div', 'msg-actions');
    const eBtn = el('button', 'act-btn edit');
    eBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Изм.`;
    eBtn.onclick = (e) => { e.stopPropagation(); doEdit(key); };
    const dBtn = el('button', 'act-btn del');
    dBtn.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>Удал.`;
    dBtn.onclick = (e) => { e.stopPropagation(); doDelete(key); };
    acts.appendChild(eBtn); acts.appendChild(dBtn);
    row.appendChild(acts);
    addSwipe(row);
  }

  c.appendChild(row);
  // scroll handled by caller
}

function patchMsg(key, msg) {
  const row = id(`m-${key}`); if (!row) return;
  const txt = row.querySelector('.msg-text');
  if (txt) { txt.textContent = msg.deleted ? 'Сообщение удалено' : (msg.text || ''); txt.className = msg.deleted ? 'msg-text deleted' : 'msg-text'; }
  const footer = row.querySelector('.msg-footer');
  if (footer && msg.edited && !msg.deleted && !footer.querySelector('.msg-edited')) {
    const e = el('span','msg-edited'); e.textContent = 'изм.';
    footer.insertBefore(e, footer.firstChild);
  }
}

// ── SWIPE ──
function addSwipe(row) {
  let sx = 0, sy = 0, swiping = false, opened = false;
  const THRESHOLD = 44;

  row.addEventListener('touchstart', e => {
    sx = e.touches[0].clientX; sy = e.touches[0].clientY; swiping = false;
    opened = row.classList.contains('actions-open');
  }, { passive: true });

  row.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - sx;
    const dy = e.touches[0].clientY - sy;
    if (!swiping && Math.abs(dy) > Math.abs(dx)) return; // vertical scroll — ignore
    swiping = true;
    // Only allow swipe left (negative dx) to open, right to close
    const effective = opened ? dx : Math.min(0, dx);
    const clamped = Math.max(-110, Math.min(0, effective));
    row.querySelector('.msg-bubble').style.transform = `translateX(${clamped}px)`;
    row.querySelector('.msg-actions').style.transform = `translateX(${100 + (clamped / 110) * 100}%)`;
  }, { passive: true });

  row.addEventListener('touchend', e => {
    if (!swiping) return;
    const dx = e.changedTouches[0].clientX - sx;
    const bubble = row.querySelector('.msg-bubble');
    const acts = row.querySelector('.msg-actions');
    bubble.style.transform = ''; acts.style.transform = '';
    if (!opened && dx < -THRESHOLD) {
      row.classList.add('actions-open');
    } else if (opened && dx > THRESHOLD) {
      row.classList.remove('actions-open');
    } else {
      row.classList.toggle('actions-open', opened);
    }
  });
}

window.closeAllActions = () => {
  document.querySelectorAll('.msg-row.actions-open').forEach(r => r.classList.remove('actions-open'));
};

// ── EDIT / DELETE ──
function doEdit(key) {
  closeAllActions();
  const row = id(`m-${key}`); if (!row) return;
  const txt = row.querySelector('.msg-text');
  if (!txt || txt.classList.contains('deleted')) return;
  editKey = key;
  id('msgInput').value = txt.textContent;
  grow(id('msgInput'));
  id('editBanner').classList.add('show');
  id('msgInput').focus();
}

window.cancelEdit = () => {
  editKey = null; id('msgInput').value = ''; id('msgInput').style.height = 'auto';
  id('editBanner').classList.remove('show');
};

function doDelete(key) {
  closeAllActions();
  update(ref(db, `messages/${key}`), { text: '', deleted: true, img: null });
}

// ── SEND ──
window.sendMsg = () => {
  const txt = id('msgInput').value.trim(); if (!db) return;
  if (editKey) {
    update(ref(db, `messages/${editKey}`), { text: txt, edited: true });
    cancelEdit(); return;
  }
  if (!txt) return;
  push(ref(db, 'messages'), { name: myName, text: txt, ts: Date.now(), type: 'msg' });
  id('msgInput').value = ''; id('msgInput').style.height = 'auto'; id('msgInput').focus();
};

window.sendImage = e => {
  const file = e.target.files[0]; if (!file || !db) return;
  if (file.size > 900000) { alert('Файл слишком большой (макс. ~900 КБ). Сожми фото.'); return; }
  const r = new FileReader();
  r.onload = ev => push(ref(db, 'messages'), { name: myName, img: ev.target.result, text: '', ts: Date.now(), type: 'msg' });
  r.readAsDataURL(file); e.target.value = '';
};

// ── VIEWER ──
window.openViewer = src => { id('viewerImg').src = src; id('viewer').classList.add('open'); };
window.closeViewer = () => id('viewer').classList.remove('open');

// ── UTILS ──
window.onKey = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } };
window.grow = el => { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 130) + 'px'; };
function scrollBot() { const c = id('messages'); c.scrollTop = c.scrollHeight; }
function id(i) { return document.getElementById(i); }
function el(tag, cls) { const e = document.createElement(tag); e.className = cls; return e; }
function show(i, v) { id(i).style.display = v ? 'flex' : 'none'; }
function slug(s) { return s.replace(/\W/g,'_'); }
function fmtTime(ts) { return new Date(ts||Date.now()).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}); }
function dateKey(ts) { if (!ts) return null; const d = new Date(ts); return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }
function formatDate(ts) {
  if (!ts) return '';
  const d = new Date(ts), now = new Date();
  if (dateKey(ts) === dateKey(now.getTime())) return 'Сегодня';
  if (dateKey(ts) === dateKey(now.getTime() - 86400000)) return 'Вчера';
  return d.toLocaleDateString('ru', { day: 'numeric', month: 'long' });
}

// ── BOOT ──
cfg = loadCfg();
if (!cfg) { id('configScreen').style.display = 'flex'; }
else {
  id('configScreen').style.display = 'none';
  show('lockScreen', true);
  setTimeout(() => id('passInput').focus(), 80);
}
</script>
