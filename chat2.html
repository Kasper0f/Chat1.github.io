<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Чат</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root {
    --bg: #0b1220;
    --surface: #111827;
    --border: #243041;
    --accent: #60a5fa;
    --accent-dim: #93c5fd;
    --text: #e8e8e8;
    --text-muted: #666;
    --msg-mine: #132238;
    --msg-theirs: #17212f;
    --danger: #ff4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%; height: 100dvh;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    overflow: hidden;
  }

  /* ── LOCK ── */
  .fullscreen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100; padding: 32px; gap: 0;
  }
  .lock-logo { font-size: 48px; margin-bottom: 32px; animation: pulse 3s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  .lock-title { font-size: 11px; letter-spacing: 4px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 40px; }
  .lock-input-wrap { width: 100%; max-width: 280px; margin-bottom: 16px; }
  .lock-input, .name-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); font-family: 'IBM Plex Mono', monospace;
    font-size: 16px; padding: 14px 16px; outline: none; letter-spacing: 2px; transition: border-color .2s;
  }
  .lock-input:focus, .name-input:focus { border-color: var(--accent); }
  .lock-input.error { border-color: var(--danger); animation: shake .3s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
  .lock-btn {
    width: 100%; max-width: 280px; background: var(--accent); color: #000; border: none;
    border-radius: 4px; font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600;
    letter-spacing: 3px; text-transform: uppercase; padding: 14px; cursor: pointer; transition: background .2s, transform .1s;
  }
  .lock-btn:active { transform: scale(.97); background: var(--accent-dim); }
  .lock-error { font-size: 11px; color: var(--danger); letter-spacing: 1px; margin-top: 12px; opacity: 0; transition: opacity .2s; }
  .lock-error.visible { opacity: 1; }
  .name-title { font-size: 11px; letter-spacing: 4px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
  .name-input { max-width: 280px; }

  /* ── CHAT ── */
  #chatScreen { display: none; flex-direction: column; height: 100%; height: 100dvh; }
  .chat-header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .header-left { display: flex; flex-direction: column; gap: 2px; }
  .header-title { font-size: 13px; font-weight: 600; letter-spacing: 2px; color: var(--accent); }
  .header-status { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; }
  .header-status .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #444; margin-right: 4px; transition: background .3s; }
  .header-status.online .dot { background: #44ff88; }
  .header-user { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; }

  .messages {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 8px; scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    max-width: 82%; padding: 10px 14px; border-radius: 4px;
    font-size: 14px; line-height: 1.5; animation: msgIn .2s ease; word-break: break-word;
    position: relative; transition: transform .25s cubic-bezier(.2,.8,.2,1), box-shadow .25s ease; box-shadow: 0 8px 24px rgba(0,0,0,.18);
  }
  @keyframes msgIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .msg.mine { background: var(--msg-mine); border: 1px solid #3a4400; align-self: flex-end; border-bottom-right-radius: 0; margin-right:110px; overflow:visible; }
  .msg.theirs { background: var(--msg-theirs); border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 0; }
  .msg.deleted { opacity: .4; }
  .msg-name { font-size: 9px; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
  .msg.mine .msg-name { color: var(--accent-dim); text-align: right; }
  .msg-text { white-space: pre-wrap; }
  .msg-text.deleted-text { font-style: italic; color: var(--text-muted); font-size: 12px; }
  .msg-img { max-width: 100%; border-radius: 3px; margin-top: 4px; display: block; cursor: pointer; }
  .msg-footer { display: flex; align-items: center; justify-content: flex-end; gap: 8px; margin-top: 4px; }
  .msg-time { font-size: 9px; color: var(--text-muted); }
  .msg-edited { font-size: 9px; color: var(--text-muted); font-style: italic; }

  /* action buttons — appear on long press / hover */
  .msg-actions {
    display: none; position: absolute; top: -28px; right: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; overflow: hidden; flex-direction: row;
  }
  .msg.mine .msg-actions { right: 0; }
  .msg.theirs .msg-actions { left: 0; right: auto; }
  .msg-actions.visible { display: flex; }
  .action-btn {
    background: none; border: none; color: var(--text-muted);
    font-size: 11px; padding: 6px 10px; cursor: pointer; letter-spacing: 1px;
    font-family: 'IBM Plex Mono', monospace; transition: background .15s, color .15s;
  }
  .action-btn:hover { background: var(--border); color: var(--text); }
  .action-btn.del { color: var(--danger); }

  .system-msg {
    align-self: center; font-size: 10px; color: var(--text-muted);
    letter-spacing: 2px; padding: 4px 10px; border: 1px solid var(--border);
    border-radius: 2px; text-transform: uppercase;
  }

  
  .msg.reply-highlight{
    animation: pulseReply .8s ease;
  }
  @keyframes pulseReply{
    0%{box-shadow:0 0 0 rgba(96,165,250,0)}
    50%{box-shadow:0 0 22px rgba(96,165,250,.5)}
    100%{box-shadow:0 8px 24px rgba(0,0,0,.18)}
  }

  .msg-actions{
    display:none;
    position:absolute;
    left:calc(100% + 12px);
    top:50%;
    transform:translateY(-50%);
    gap:8px;
    background:none;
    border:none;
    z-index:20;
  }
  .msg-actions.visible{display:flex;}
  .action-btn{
    border-radius:12px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
  }

  

/* ── INPUT AREA ── */
  .chat-input-area {
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
  }
  .edit-banner {
    display: none; background: #1a1f00; border: 1px solid #3a4400;
    border-radius: 3px; padding: 6px 10px; font-size: 11px; color: var(--accent-dim);
    letter-spacing: 1px; align-items: center; justify-content: space-between;
  }
  .edit-banner.visible { display: flex; }
  .edit-cancel { background: none; border: none; color: var(--text-muted); font-size: 16px; cursor: pointer; padding: 0 4px; }
  .input-row { display: flex; gap: 8px; align-items: flex-end; }
  .chat-textarea {
    flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 14px;
    padding: 10px 12px; resize: none; outline: none; max-height: 120px; min-height: 42px;
    line-height: 1.5; transition: border-color .2s;
  }
  .chat-textarea:focus { border-color: var(--accent); }
  .send-btn {
    background: var(--accent); border: none; border-radius: 4px;
    width: 42px; height: 42px; flex-shrink: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: background .2s, transform .1s;
  }
  .send-btn:active { transform: scale(.93); background: var(--accent-dim); }
  .send-btn svg { width: 18px; height: 18px; }
  .img-btn {
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    width: 42px; height: 42px; flex-shrink: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: border-color .2s;
  }
  .img-btn:active { border-color: var(--accent); }
  .img-btn svg { width: 20px; height: 20px; stroke: var(--text-muted); }
  #fileInput { display: none; }

  /* ── IMAGE VIEWER ── */
  #imgViewer {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.92);
    z-index: 200; align-items: center; justify-content: center;
  }
  #imgViewer.open { display: flex; }
  #imgViewer img { max-width: 95vw; max-height: 90vh; border-radius: 4px; }
  #imgViewer .close-btn {
    position: absolute; top: 16px; right: 16px; background: none; border: none;
    color: #fff; font-size: 28px; cursor: pointer; line-height: 1;
  }

  /* ── CONFIG ── */
  #configNotice {
    position: fixed; inset: 0; background: rgba(0,0,0,.92);
    z-index: 300; display: flex; align-items: center; justify-content: center; padding: 16px;
  }
  .config-box {
    background: var(--surface); border: 1px solid var(--accent); border-radius: 6px;
    padding: 24px; width: 100%; max-width: 360px; font-size: 12px; line-height: 1.8; overflow-y: auto; max-height: 90vh;
  }
  .config-box h2 { font-size: 13px; color: var(--accent); letter-spacing: 2px; margin-bottom: 16px; text-transform: uppercase; }
  .config-box .field { margin: 10px 0; display: flex; flex-direction: column; gap: 4px; }
  .config-box label { font-size: 10px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }
  .config-box input {
    background: #111; border: 1px solid var(--border); border-radius: 3px;
    color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    padding: 8px 10px; outline: none; width: 100%;
  }
  .config-box input:focus { border-color: var(--accent); }
  .config-save {
    width: 100%; background: var(--accent); color: #000; border: none; border-radius: 3px;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase; padding: 12px; cursor: pointer; margin-top: 16px;
  }
</style>
</head>
<body>

<!-- CONFIG -->
<div id="configNotice">
  <div class="config-box">
    <h2>⚙ Настройка Firebase</h2>
    <p style="color:#888;font-size:11px;margin-bottom:16px;">Данные из Firebase Console → настройки проекта → веб-приложение</p>
    <div class="field"><label>API Key</label><input id="cfg_apiKey" placeholder="AIzaSy..." autocomplete="off"></div>
    <div class="field"><label>Project ID</label><input id="cfg_projectId" placeholder="my-project-123" autocomplete="off"></div>
    <div class="field"><label>Database URL</label><input id="cfg_dbUrl" placeholder="https://my-project-123-default-rtdb.firebaseio.com" autocomplete="off"></div>
    <div class="field"><label>App ID</label><input id="cfg_appId" placeholder="1:123456:web:abc123" autocomplete="off"></div>
    <div class="field"><label>Пароль чата</label><input id="cfg_password" type="password" placeholder="Придумай надёжный пароль" autocomplete="off"></div>
    <button class="config-save" onclick="saveConfig()">СОХРАНИТЬ И ЗАПУСТИТЬ</button>
  </div>
</div>

<!-- LOCK -->
<div id="lockScreen" class="fullscreen" style="display:none;">
  <div class="lock-logo">🔒</div>
  <div class="lock-title">Введите пароль для входа</div>
  <div class="lock-input-wrap">
    <input class="lock-input" id="passwordInput" type="password" placeholder="пароль" autocomplete="off"
      onkeydown="if(event.key==='Enter') checkPassword()">
  </div>
  <button class="lock-btn" onclick="checkPassword()">ВОЙТИ</button>
  <div class="lock-error" id="lockError">Неверный пароль</div>
</div>

<!-- NAME -->
<div id="nameScreen" class="fullscreen" style="display:none;">
  <div class="lock-logo">✏️</div>
  <div class="name-title">Как тебя зовут?</div>
  <input class="name-input" id="nameInput" type="text" placeholder="Имя или псевдоним" maxlength="20" autocomplete="off"
    onkeydown="if(event.key==='Enter') enterChat()" style="margin-bottom:16px;">
  <button class="lock-btn" onclick="enterChat()">В ЧАТ</button>
</div>

<!-- CHAT -->
<div id="chatScreen">
  <div class="chat-header">
    <div class="header-left">
      <div class="header-title">[ ЧАТROOM ]</div>
      <div class="header-status" id="connStatus"><span class="dot"></span><span id="connText">подключение...</span></div>
    </div>
    <div class="header-user" id="headerUser"></div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="chat-input-area">
    <div class="edit-banner" id="editBanner">
      <span>✏ редактирование</span>
      <button class="edit-cancel" onclick="cancelEdit()">✕</button>
    </div>
    <div class="input-row">
      <button class="img-btn" onclick="document.getElementById('fileInput').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </button>
      <input type="file" id="fileInput" accept="image/*" onchange="handleImage(event)">
      <textarea class="chat-textarea" id="msgInput" placeholder="Написать сообщение..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- IMAGE VIEWER -->
<div id="imgViewer">
  <button class="close-btn" onclick="closeViewer()">✕</button>
  <img id="viewerImg" src="">
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, onChildAdded, onChildChanged, onChildRemoved, update, remove, set, onDisconnect, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const STORAGE_KEY = 'chatConfig_v1';
const SESSION_KEY = 'chatSession_v1';
let db, myName, chatConfig;
let editingKey = null;
let longPressTimer = null;

// ── CONFIG ──
function loadConfig() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; }
}

window.saveConfig = function() {
  const cfg = {
    apiKey: document.getElementById('cfg_apiKey').value.trim(),
    projectId: document.getElementById('cfg_projectId').value.trim(),
    databaseURL: document.getElementById('cfg_dbUrl').value.trim(),
    appId: document.getElementById('cfg_appId').value.trim(),
    password: document.getElementById('cfg_password').value,
  };
  if (!cfg.apiKey || !cfg.projectId || !cfg.databaseURL || !cfg.password) { alert('Заполни все поля кроме App ID'); return; }
  if (!cfg.appId) cfg.appId = 'placeholder';
  localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));
  location.reload();
};

// ── AUTH ──
window.checkPassword = function() {
  const input = document.getElementById('passwordInput').value;
  const errEl = document.getElementById('lockError');
  const inEl = document.getElementById('passwordInput');
  hashStr(input).then(h => hashStr(chatConfig.password).then(ch => {
    if (h === ch) {
      const saved = sessionStorage.getItem(SESSION_KEY);
      if (saved) { myName = saved; showChat(); }
      else {
        document.getElementById('lockScreen').style.display = 'none';
        document.getElementById('nameScreen').style.display = 'flex';
        setTimeout(() => document.getElementById('nameInput').focus(), 100);
      }
    } else {
      inEl.classList.add('error'); errEl.classList.add('visible'); inEl.value = '';
      setTimeout(() => { inEl.classList.remove('error'); errEl.classList.remove('visible'); }, 2000);
    }
  }));
};

window.enterChat = function() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return;
  myName = name;
  sessionStorage.setItem(SESSION_KEY, name);
  showChat();
};

async function hashStr(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── CHAT INIT ──
function showChat() {
  document.getElementById('nameScreen').style.display = 'none';
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('chatScreen').style.display = 'flex';
  document.getElementById('headerUser').textContent = myName;
  initFirebaseChat();
}

function initFirebaseChat() {
  const app = initializeApp({
    apiKey: chatConfig.apiKey, projectId: chatConfig.projectId,
    databaseURL: chatConfig.databaseURL, appId: chatConfig.appId,
    authDomain: `${chatConfig.projectId}.firebaseapp.com`,
  });
  db = getDatabase(app);

  // Presence
  const presRef = ref(db, `presence/${myName.replace(/\W/g,'_')}`);
  set(presRef, { online: true, name: myName });
  onDisconnect(presRef).remove();
  onValue(ref(db, 'presence'), snap => {
    const data = snap.exists() ? snap.val() : {};
    const count = Object.values(data).filter(v => v && v.online).length;
    const statusEl = document.getElementById('connStatus');
    statusEl.classList.toggle('online', count > 0);
    document.getElementById('connText').textContent = count < 1 ? 'нет подключений' : `онлайн: ${count}`;
  });

  // Messages
  let firstLoad = true;
  const msgsRef = ref(db, 'messages');

  onChildAdded(msgsRef, (snap) => {
    renderMessage(snap.key, snap.val(), firstLoad);
  });

  onChildChanged(msgsRef, (snap) => {
    updateMessageDOM(snap.key, snap.val());
  });

  onChildRemoved(msgsRef, (snap) => {
    const el = document.getElementById(`msg-${snap.key}`);
    if (el) el.remove();
  });

  setTimeout(() => { firstLoad = false; scrollToBottom(); }, 600);
  document.getElementById('msgInput').focus();
}

// ── RENDER ──
function renderMessage(key, msg, instant) {
  if (document.getElementById(`msg-${key}`)) return;
  const container = document.getElementById('messages');

  if (msg.type === 'system') {
    const el = document.createElement('div');
    el.className = 'system-msg'; el.id = `msg-${key}`; el.textContent = msg.text;
    container.appendChild(el);
    if (!instant) scrollToBottom();
    return;
  }

  const mine = msg.name === myName;
  const wrap = document.createElement('div');
  wrap.className = `msg ${mine ? 'mine' : 'theirs'}`;
  wrap.id = `msg-${key}`;
  wrap.dataset.key = key;
  wrap.dataset.mine = mine ? '1' : '0';

  // Actions (edit/delete — only own messages)
  if (mine) {
    const actions = document.createElement('div');
    actions.className = 'msg-actions';
    actions.innerHTML = `
      <button class="action-btn" onclick="startEdit('${key}')">✏ изм</button>
      <button class="action-btn del" onclick="deleteMsg('${key}')">✕ удал</button>
    `;
    wrap.appendChild(actions);
  }

  const nameEl = document.createElement('div');
  nameEl.className = 'msg-name'; nameEl.textContent = msg.name;
  wrap.appendChild(nameEl);

  if (msg.image) {
    const img = document.createElement('img');
    img.className = 'msg-img'; img.src = msg.image;
    img.onclick = () => openViewer(msg.image);
    wrap.appendChild(img);
  }

  const textEl = document.createElement('div');
  textEl.className = `msg-text${msg.deleted ? ' deleted-text' : ''}`;
  textEl.textContent = msg.deleted ? 'Сообщение удалено' : (msg.text || '');
  wrap.appendChild(textEl);

  const footer = document.createElement('div');
  footer.className = 'msg-footer';
  if (msg.edited && !msg.deleted) {
    const editedEl = document.createElement('span');
    editedEl.className = 'msg-edited'; editedEl.textContent = 'изменено';
    footer.appendChild(editedEl);
  }
  const timeEl = document.createElement('div');
  timeEl.className = 'msg-time';
  timeEl.textContent = new Date(msg.timestamp || Date.now()).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
  footer.appendChild(timeEl);
  wrap.appendChild(footer);


  // Advanced swipe actions
  if (mine) {
    let startX=0,currentX=0;

    wrap.addEventListener('touchstart',(e)=>{
      startX=e.touches[0].clientX;
    },{passive:true});

    wrap.addEventListener('touchmove',(e)=>{
      currentX=e.touches[0].clientX;
      const dx=currentX-startX;

      if(dx<0){
        wrap.style.transform=`translateX(${Math.max(dx,-110)}px)`;
      }
    },{passive:true});

    wrap.addEventListener('touchend',()=>{
      const dx=currentX-startX;
      hideAllActions();

      if(dx<-90){
        const btn=wrap.querySelector('.action-btn.del');
        if(btn) btn.animate([{transform:'scale(1)'},{transform:'scale(1.15)'},{transform:'scale(1)'}],{duration:250});
      }

      if(dx<-45){
        const actions=wrap.querySelector('.msg-actions');
        if(actions) actions.classList.add('visible');
        wrap.style.transform='translateX(-110px)';
        if(navigator.vibrate) navigator.vibrate(20);
      }else{
        wrap.style.transform='translateX(0)';
      }

      startX=0;
      currentX=0;
    });

    wrap.addEventListener('dblclick',()=>{
      wrap.classList.add('reply-highlight');
      setTimeout(()=>wrap.classList.remove('reply-highlight'),800);
    });

    wrap.addEventListener('click',(e)=>{
      if(!e.target.classList.contains('action-btn')) hideAllActions();
    });
  }

  container.appendChild(wrap);
  if (!instant) scrollToBottom();
}

function updateMessageDOM(key, msg) {
  const el = document.getElementById(`msg-${key}`);
  if (!el) return;

  const oldBar = el.querySelector('.reaction-bar');
  if (oldBar) oldBar.remove();
  const textEl = el.querySelector('.msg-text');
  if (textEl) {
    textEl.textContent = msg.deleted ? 'Сообщение удалено' : (msg.text || '');
    textEl.className = `msg-text${msg.deleted ? ' deleted-text' : ''}`;
  }
  const footer = el.querySelector('.msg-footer');
  if (footer && msg.edited && !msg.deleted) {
    if (!footer.querySelector('.msg-edited')) {
      const editedEl = document.createElement('span');
      editedEl.className = 'msg-edited'; editedEl.textContent = 'изменено';
      footer.insertBefore(editedEl, footer.firstChild);
    }
  }


}

function toggleActions(wrap) {
  hideAllActions();
  const actions = wrap.querySelector('.msg-actions');
  if (actions) actions.classList.toggle('visible');
}

function hideAllActions() {
  document.querySelectorAll('.msg-actions.visible').forEach(a => a.classList.remove('visible'));
  document.querySelectorAll('.msg').forEach(m=>m.style.transform='translateX(0)');
}


function addReactionUI(wrap,msgKey,msg){
  const bar=document.createElement('div');
  bar.className='reaction-bar';
  const reactions=(msg && msg.reactions) || {};

  ['👍','👎','🤝'].forEach(r=>{
    const b=document.createElement('button');
    b.className='reaction-btn';

    const renderBtn=()=>{
      const users=reactions[r] ? Object.keys(reactions[r]) : [];
      b.textContent = users.length ? `${r} ${users.length}` : r;
    };

    renderBtn();

    b.onclick=(e)=>{
      e.stopPropagation();
      const hasReacted = reactions[r] && reactions[r][myName];

      if(hasReacted){
        update(ref(db, `messages/${msgKey}/reactions/${r}`), {[myName]: null});
      }else{
        update(ref(db, `messages/${msgKey}/reactions/${r}`), {[myName]: true});
      }
    };

    bar.appendChild(b);
  });

  wrap.appendChild(bar);
}


// ── SEND ──
window.sendMessage = function() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!db) return;

  if (editingKey) {
    update(ref(db, `messages/${editingKey}`), { text, edited: true });
    cancelEdit();
    return;
  }

  if (!text) return;
  push(ref(db, 'messages'), { name: myName, text, timestamp: Date.now(), type: 'message' });
  input.value = ''; input.style.height = 'auto'; input.focus();
};

// ── EDIT / DELETE ──
window.startEdit = function(key) {
  hideAllActions();
  const el = document.getElementById(`msg-${key}`);
  if (!el) return;
  const text = el.querySelector('.msg-text')?.textContent || '';
  if (text === 'Сообщение удалено') return;
  editingKey = key;
  const input = document.getElementById('msgInput');
  input.value = text; input.focus();
  autoResize(input);
  document.getElementById('editBanner').classList.add('visible');
};

window.cancelEdit = function() {
  editingKey = null;
  document.getElementById('msgInput').value = '';
  document.getElementById('msgInput').style.height = 'auto';
  document.getElementById('editBanner').classList.remove('visible');
};

window.deleteMsg = function(key) {
  hideAllActions();
  update(ref(db, `messages/${key}`), { text: '', deleted: true, image: null });
};

// ── IMAGES ──
window.handleImage = function(e) {
  const file = e.target.files[0];
  if (!file || !db) return;
  if (file.size > 800000) { alert('Изображение слишком большое. Максимум ~800 КБ.'); return; }
  const reader = new FileReader();
  reader.onload = (ev) => {
    push(ref(db, 'messages'), {
      name: myName, image: ev.target.result,
      timestamp: Date.now(), type: 'message', text: ''
    });
  };
  reader.readAsDataURL(file);
  e.target.value = '';
};

window.openViewer = function(src) {
  document.getElementById('viewerImg').src = src;
  document.getElementById('imgViewer').classList.add('open');
};

window.closeViewer = function() {
  document.getElementById('imgViewer').classList.remove('open');
};

// ── UTILS ──
window.handleKey = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
};

window.autoResize = function(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
};

function scrollToBottom() {
  const c = document.getElementById('messages');
  c.scrollTop = c.scrollHeight;
}

// ── INIT ──
chatConfig = loadConfig();
if (!chatConfig) {
  document.getElementById('configNotice').style.display = 'flex';
} else {
  document.getElementById('configNotice').style.display = 'none';
  document.getElementById('lockScreen').style.display = 'flex';
  setTimeout(() => document.getElementById('passwordInput').focus(), 100);
}
</script>
</body>
