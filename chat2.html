<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Чат</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --accent: #e8ff00;
    --accent-dim: #b8cc00;
    --text: #e8e8e8;
    --text-muted: #666;
    --msg-mine: #1a1f00;
    --msg-theirs: #1a1a1a;
    --danger: #ff4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%; height: 100dvh;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    overflow: hidden;
  }

  /* ── LOCK ── */
  .fullscreen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100; padding: 32px; gap: 0;
  }
  .lock-logo { font-size: 48px; margin-bottom: 32px; animation: pulse 3s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  .lock-title { font-size: 11px; letter-spacing: 4px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 40px; }
  .lock-input-wrap { width: 100%; max-width: 280px; margin-bottom: 16px; }
  .lock-input, .name-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); font-family: 'IBM Plex Mono', monospace;
    font-size: 16px; padding: 14px 16px; outline: none; letter-spacing: 2px; transition: border-color .2s;
  }
  .lock-input:focus, .name-input:focus { border-color: var(--accent); }
  .lock-input.error { border-color: var(--danger); animation: shake .3s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
  .lock-btn {
    width: 100%; max-width: 280px; background: var(--accent); color: #000; border: none;
    border-radius: 4px; font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600;
    letter-spacing: 3px; text-transform: uppercase; padding: 14px; cursor: pointer; transition: background .2s, transform .1s;
  }
  .lock-btn:active { transform: scale(.97); background: var(--accent-dim); }
  .lock-error { font-size: 11px; color: var(--danger); letter-spacing: 1px; margin-top: 12px; opacity: 0; transition: opacity .2s; }
  .lock-error.visible { opacity: 1; }
  .name-title { font-size: 11px; letter-spacing: 4px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
  .name-input { max-width: 280px; }

  /* ── CHAT ── */
  #chatScreen { display: none; flex-direction: column; height: 100%; height: 100dvh; }
  .chat-header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .header-left { display: flex; flex-direction: column; gap: 2px; }
  .header-title { font-size: 13px; font-weight: 600; letter-spacing: 2px; color: var(--accent); }
  .header-status { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; }
  .header-status .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #444; margin-right: 4px; transition: background .3s; }
  .header-status.online .dot { background: #44ff88; }
  .header-user { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; }

  .messages {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 8px; scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    max-width: 82%; padding: 10px 14px; border-radius: 4px;
    font-size: 14px; line-height: 1.5; animation: msgIn .2s ease; word-break: break-word;
    position: relative;
  }
  @keyframes msgIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .msg.mine { background: var(--msg-mine); border: 1px solid #3a4400; align-self: flex-end; border-bottom-right-radius: 0; }
  .msg.theirs { background: var(--msg-theirs); border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 0; }
  .msg.deleted { opacity: .4; }
  .msg-name { font-size: 9px; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
  .msg.mine .msg-name { color: var(--accent-dim); text-align: right; }
  .msg-text { white-space: pre-wrap; }
  .msg-text.deleted-text { font-style: italic; color: var(--text-muted); font-size: 12px; }
  .msg-img { max-width: 100%; border-radius: 3px; margin-top: 4px; display: block; cursor: pointer; }
  .msg-footer { display: flex; align-items: center; justify-content: flex-end; gap: 8px; margin-top: 4px; }
  .msg-time { font-size: 9px; color: var(--text-muted); }
  .msg-edited { font-size: 9px; color: var(--text-muted); font-style: italic; }

  /* action buttons — appear on long press / hover */
  .msg-actions {
    display: none; position: absolute; top: -28px; right: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; overflow: hidden; flex-direction: row;
  }
  .msg.mine .msg-actions { right: 0; }
  .msg.theirs .msg-actions { left: 0; right: auto; }
  .msg-actions.visible { display: flex; }
  .action-btn {
    background: none; border: none; color: var(--text-muted);
    font-size: 11px; padding: 6px 10px; cursor: pointer; letter-spacing: 1px;
    font-family: 'IBM Plex Mono', monospace; transition: background .15s, color .15s;
  }
  .action-btn:hover { background: var(--border); color: var(--text); }
  .action-btn.del { color: var(--danger); }

  .system-msg {
    align-self: center; font-size: 10px; color: var(--text-muted);
    letter-spacing: 2px; padding: 4px 10px; border: 1px solid var(--border);
    border-radius: 2px; text-transform: uppercase;
  }

  /* ── INPUT AREA ── */
  .chat-input-area {
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
  }
  .edit-banner {
    display: none; background: #1a1f00; border: 1px solid #3a4400;
    border-radius: 3px; padding: 6px 10px; font-size: 11px; color: var(--accent-dim);
    letter-spacing: 1px; align-items: center; justify-content: space-between;
  }
  .edit-banner.visible { display: flex; }
  .edit-cancel { background: none; border: none; color: var(--text-muted); font-size: 16px; cursor: pointer; padding: 0 4px; }
  .input-row { display: flex; gap: 8px; align-items: flex-end; }
  .chat-textarea {
    flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 14px;
    padding: 10px 12px; resize: none; outline: none; max-height: 120px; min-height: 42px;
    line-height: 1.5; transition: border-color .2s;
  }
  .chat-textarea:focus { border-color: var(--accent); }
  .send-btn {
    background: var(--accent); border: none; border-radius: 4px;
    width: 42px; height: 42px; flex-shrink: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: background .2s, transform .1s;
  }
  .send-btn:active { transform: scale(.93); background: var(--accent-dim); }
  .send-btn svg { width: 18px; height: 18px; }
  .img-btn {
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    width: 42px; height: 42px; flex-shrink: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: border-color .2s;
  }
  .img-btn:active { border-color: var(--accent); }
  .img-btn svg { width: 20px; height: 20px; stroke: var(--text-muted); }
  #fileInput { display: none; }

  /* ── IMAGE VIEWER ── */
  #imgViewer {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.92);
    z-index: 200; align-items: center; justify-content: center;
  }
  #imgViewer.open { display: flex; }
  #imgViewer img { max-width: 95vw; max-height: 90vh; border-radius: 4px; }
  #imgViewer .close-btn {
    position: absolute; top: 16px; right: 16px; background: none; border: none;
    color: #fff; font-size: 28px; cursor: pointer; line-height: 1;
  }

  /* ── CONFIG ── */
  #configNotice {
    position: fixed; inset: 0; background: rgba(0,0,0,.92);
    z-index: 300; display: flex; align-items: center; justify-content: center; padding: 16px;
  }
  .config-box {
    background: var(--surface); border: 1px solid var(--accent); border-radius: 6px;
    padding: 24px; width: 100%; max-width: 360px; font-size: 12px; line-height: 1.8; overflow-y: auto; max-height: 90vh;
  }
  .config-box h2 { font-size: 13px; color: var(--accent); letter-spacing: 2px; margin-bottom: 16px; text-transform: uppercase; }
  .config-box .field { margin: 10px 0; display: flex; flex-direction: column; gap: 4px; }
  .config-box label { font-size: 10px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }
  .config-box input {
    background: #111; border: 1px solid var(--border); border-radius: 3px;
    color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    padding: 8px 10px; outline: none; width: 100%;
  }
  .config-box input:focus { border-color: var(--accent); }
  .config-save {
    width: 100%; background: var(--accent); color: #000; border: none; border-radius: 3px;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase; padding: 12px; cursor: pointer; margin-top: 16px;
  }

  /* ── THEME BUTTON ── */
  .theme-btn {
    background: none; border: 1px solid var(--border); border-radius: 4px;
    width: 34px; height: 34px; cursor: pointer; display: flex; align-items: center;
    justify-content: center; transition: border-color .2s, background .2s; flex-shrink: 0;
    font-size: 15px;
  }
  .theme-btn:hover { border-color: var(--accent); background: rgba(255,255,255,.04); }

  /* ── THEME PANEL ── */
  #themePanel {
    position: fixed; inset: 0; z-index: 250;
    display: flex; align-items: flex-end; justify-content: center;
    background: rgba(0,0,0,0); pointer-events: none;
    transition: background .25s;
  }
  #themePanel.open {
    background: rgba(0,0,0,.7); pointer-events: all;
  }
  .theme-sheet {
    width: 100%; max-width: 480px; max-height: 92vh;
    background: var(--surface); border: 1px solid var(--border);
    border-bottom: none; border-radius: 12px 12px 0 0;
    padding: 20px 20px 32px; overflow-y: auto;
    transform: translateY(100%); transition: transform .3s cubic-bezier(.4,0,.2,1);
  }
  #themePanel.open .theme-sheet { transform: translateY(0); }

  .theme-sheet-handle {
    width: 36px; height: 4px; background: var(--border);
    border-radius: 2px; margin: 0 auto 20px;
  }
  .theme-sheet h3 {
    font-size: 11px; letter-spacing: 3px; color: var(--text-muted);
    text-transform: uppercase; margin-bottom: 20px; text-align: center;
  }

  /* Preset themes */
  .theme-presets-label {
    font-size: 9px; letter-spacing: 2px; color: var(--text-muted);
    text-transform: uppercase; margin-bottom: 10px;
  }
  .theme-presets {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 24px;
  }
  .theme-preset {
    border-radius: 6px; overflow: hidden; cursor: pointer;
    border: 2px solid transparent; transition: border-color .2s, transform .15s;
    aspect-ratio: 1; display: flex; flex-direction: column;
  }
  .theme-preset:hover { transform: scale(1.05); }
  .theme-preset.active { border-color: var(--accent); }
  .theme-preset-preview {
    flex: 1; display: flex; flex-direction: column; padding: 6px; gap: 4px;
  }
  .tp-bar { height: 4px; border-radius: 2px; opacity: .7; }
  .tp-msg { height: 6px; border-radius: 2px; margin-left: auto; width: 60%; }
  .tp-msg2 { height: 6px; border-radius: 2px; width: 70%; }
  .theme-preset-name {
    font-size: 8px; letter-spacing: 1px; text-align: center;
    padding: 4px 2px; text-transform: uppercase;
    font-family: 'IBM Plex Mono', monospace; color: #888;
  }

  /* Custom pickers */
  .theme-custom-label {
    font-size: 9px; letter-spacing: 2px; color: var(--text-muted);
    text-transform: uppercase; margin-bottom: 12px;
  }
  .theme-pickers { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .picker-row {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .picker-row label {
    font-size: 11px; color: var(--text); letter-spacing: 1px; flex: 1;
  }
  .picker-swatch-wrap {
    display: flex; align-items: center; gap: 8px;
  }
  .picker-hex {
    background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
    color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    padding: 5px 8px; width: 90px; outline: none; letter-spacing: 1px;
    text-transform: uppercase; transition: border-color .2s;
  }
  .picker-hex:focus { border-color: var(--accent); }
  .color-dot {
    width: 28px; height: 28px; border-radius: 50%; border: 2px solid #333;
    cursor: pointer; flex-shrink: 0; transition: transform .15s;
    position: relative; overflow: hidden;
  }
  .color-dot:hover { transform: scale(1.15); }
  .color-dot input[type=color] {
    position: absolute; inset: -6px; opacity: 0; cursor: pointer; width: 200%; height: 200%;
  }

  /* Palette selector */
  .palette-label {
    font-size: 9px; letter-spacing: 2px; color: var(--text-muted);
    text-transform: uppercase; margin-bottom: 10px;
  }
  .palette-grid {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px;
  }
  .palette-dot {
    width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: transform .15s, border-color .2s;
    flex-shrink: 0;
  }
  .palette-dot:hover { transform: scale(1.2); }
  .palette-dot.selected { border-color: var(--text); }

  /* Action buttons */
  .theme-actions { display: flex; gap: 10px; }
  .theme-apply-btn {
    flex: 1; background: var(--accent); color: #000; border: none; border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase; padding: 13px; cursor: pointer;
    transition: opacity .2s, transform .1s;
  }
  .theme-apply-btn:active { transform: scale(.97); opacity: .85; }
  .theme-reset-btn {
    background: none; border: 1px solid var(--border); border-radius: 4px;
    color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    letter-spacing: 1px; padding: 13px 16px; cursor: pointer; transition: border-color .2s;
  }
  .theme-reset-btn:hover { border-color: var(--text-muted); }

  /* Preview bar */
  .theme-preview-bar {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 12px 14px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
  }
  .preview-bubble-mine {
    height: 10px; border-radius: 3px; background: var(--msg-mine);
    border: 1px solid #3a4400; width: 60px;
  }
  .preview-bubble-theirs {
    height: 10px; border-radius: 3px; background: var(--msg-theirs);
    border: 1px solid var(--border); width: 45px;
  }
  .preview-accent-dot {
    width: 10px; height: 10px; border-radius: 50%; background: var(--accent); flex-shrink: 0;
  }
  .preview-text { font-size: 9px; color: var(--text-muted); letter-spacing: 1px; margin-left: auto; }
</style>
</head>
<body>

<!-- CONFIG -->
<div id="configNotice">
  <div class="config-box">
    <h2>⚙ Настройка Firebase</h2>
    <p style="color:#888;font-size:11px;margin-bottom:16px;">Данные из Firebase Console → настройки проекта → веб-приложение</p>
    <div class="field"><label>API Key</label><input id="cfg_apiKey" placeholder="AIzaSy..." autocomplete="off"></div>
    <div class="field"><label>Project ID</label><input id="cfg_projectId" placeholder="my-project-123" autocomplete="off"></div>
    <div class="field"><label>Database URL</label><input id="cfg_dbUrl" placeholder="https://my-project-123-default-rtdb.firebaseio.com" autocomplete="off"></div>
    <div class="field"><label>App ID</label><input id="cfg_appId" placeholder="1:123456:web:abc123" autocomplete="off"></div>
    <div class="field"><label>Пароль чата</label><input id="cfg_password" type="password" placeholder="Придумай надёжный пароль" autocomplete="off"></div>
    <button class="config-save" onclick="saveConfig()">СОХРАНИТЬ И ЗАПУСТИТЬ</button>
  </div>
</div>

<!-- LOCK -->
<div id="lockScreen" class="fullscreen" style="display:none;">
  <div class="lock-logo">🔒</div>
  <div class="lock-title">Введите пароль для входа</div>
  <div class="lock-input-wrap">
    <input class="lock-input" id="passwordInput" type="password" placeholder="пароль" autocomplete="off"
      onkeydown="if(event.key==='Enter') checkPassword()">
  </div>
  <button class="lock-btn" onclick="checkPassword()">ВОЙТИ</button>
  <div class="lock-error" id="lockError">Неверный пароль</div>
</div>

<!-- NAME -->
<div id="nameScreen" class="fullscreen" style="display:none;">
  <div class="lock-logo">✏️</div>
  <div class="name-title">Как тебя зовут?</div>
  <input class="name-input" id="nameInput" type="text" placeholder="Имя или псевдоним" maxlength="20" autocomplete="off"
    onkeydown="if(event.key==='Enter') enterChat()" style="margin-bottom:16px;">
  <button class="lock-btn" onclick="enterChat()">В ЧАТ</button>
</div>

<!-- CHAT -->
<div id="chatScreen">
  <div class="chat-header">
    <div class="header-left">
      <div class="header-title">[ ЧАТROOM ]</div>
      <div class="header-status" id="connStatus"><span class="dot"></span><span id="connText">подключение...</span></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="header-user" id="headerUser"></div>
      <button class="theme-btn" onclick="openThemePanel()" title="Цветовая тема">🎨</button>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="chat-input-area">
    <div class="edit-banner" id="editBanner">
      <span>✏ редактирование</span>
      <button class="edit-cancel" onclick="cancelEdit()">✕</button>
    </div>
    <div class="input-row">
      <button class="img-btn" onclick="document.getElementById('fileInput').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </button>
      <input type="file" id="fileInput" accept="image/*" onchange="handleImage(event)">
      <textarea class="chat-textarea" id="msgInput" placeholder="Написать сообщение..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- THEME PANEL -->
<div id="themePanel" onclick="handleThemePanelClick(event)">
  <div class="theme-sheet" id="themeSheet">
    <div class="theme-sheet-handle"></div>
    <h3>Цветовая тема</h3>

    <!-- Live preview -->
    <div class="theme-preview-bar" id="themePreviewBar">
      <div class="preview-accent-dot" id="previewAccentDot"></div>
      <div class="preview-bubble-mine" id="previewMine"></div>
      <div class="preview-bubble-theirs" id="previewTheirs"></div>
      <div class="preview-text">предпросмотр</div>
    </div>

    <!-- Preset themes -->
    <div class="theme-presets-label">Готовые темы</div>
    <div class="theme-presets" id="themePresets"></div>

    <!-- Accent palette -->
    <div class="palette-label">Акцентный цвет</div>
    <div class="palette-grid" id="accentPalette"></div>

    <!-- Custom pickers -->
    <div class="theme-custom-label">Настройка вручную</div>
    <div class="theme-pickers">
      <div class="picker-row">
        <label>Фон</label>
        <div class="picker-swatch-wrap">
          <input class="picker-hex" id="pick_bg" maxlength="7" oninput="onHexInput(this,'--bg')" placeholder="#0d0d0d">
          <div class="color-dot" id="dot_bg" style="background:var(--bg)">
            <input type="color" oninput="onColorPick(this,'--bg','pick_bg','dot_bg')">
          </div>
        </div>
      </div>
      <div class="picker-row">
        <label>Поверхность</label>
        <div class="picker-swatch-wrap">
          <input class="picker-hex" id="pick_surface" maxlength="7" oninput="onHexInput(this,'--surface')" placeholder="#161616">
          <div class="color-dot" id="dot_surface" style="background:var(--surface)">
            <input type="color" oninput="onColorPick(this,'--surface','pick_surface','dot_surface')">
          </div>
        </div>
      </div>
      <div class="picker-row">
        <label>Акцент</label>
        <div class="picker-swatch-wrap">
          <input class="picker-hex" id="pick_accent" maxlength="7" oninput="onHexInput(this,'--accent')" placeholder="#e8ff00">
          <div class="color-dot" id="dot_accent" style="background:var(--accent)">
            <input type="color" oninput="onColorPick(this,'--accent','pick_accent','dot_accent')">
          </div>
        </div>
      </div>
      <div class="picker-row">
        <label>Текст</label>
        <div class="picker-swatch-wrap">

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, onChildAdded, onChildChanged, onChildRemoved, update, set, onDisconnect, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const STORAGE_KEY = 'chatConfig_v1';
const SESSION_KEY  = 'chatSession_v1';
const LOCKOUT_KEY  = 'chatLockout_v1';
const MAX_ATTEMPTS = 5;
const LOCKOUT_MS   = 5 * 60 * 1000;   // 5 min
const SESSION_TTL  = 8 * 60 * 60 * 1000; // 8 h
const SEND_COOLDOWN = 500;
const MSG_MAX_LEN  = 2000;

let db, myName, chatConfig;
let cryptoKey = null;          // AES-GCM CryptoKey — only lives in memory
let editingKey = null;
let longPressTimer = null;
let lastSendTime = 0;

// ══════════════════════════════════════════════
// CRYPTO  (AES-256-GCM  +  PBKDF2)
// ══════════════════════════════════════════════

// Derive AES-GCM key from password using PBKDF2.
// Salt is fixed per chat (projectId bytes) so all clients derive the same key.
async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey(
    'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: enc.encode(salt), iterations: 200_000, hash: 'SHA-256' },
    baseKey,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt', 'decrypt']
  );
}

async function encrypt(plaintext) {
  const iv  = crypto.getRandomValues(new Uint8Array(12));
  const enc = new TextEncoder();
  const ct  = await crypto.subtle.encrypt(
    { name: 'AES-GCM', iv },
    cryptoKey,
    enc.encode(plaintext)
  );
  // Prefix IV to ciphertext, then base64
  const combined = new Uint8Array(12 + ct.byteLength);
  combined.set(iv, 0);
  combined.set(new Uint8Array(ct), 12);
  return btoa(String.fromCharCode(...combined));
}

async function decrypt(b64) {
  try {
    const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const iv    = bytes.slice(0, 12);
    const ct    = bytes.slice(12);
    const pt    = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, cryptoKey, ct);
    return new TextDecoder().decode(pt);
  } catch {
    return '[не удалось расшифровать]';
  }
}

// ══════════════════════════════════════════════
// HASH  (SHA-256 hex)
// ══════════════════════════════════════════════
async function hashStr(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ══════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════
function loadConfig() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; }
}

window.saveConfig = async function() {
  const rawPassword = document.getElementById('cfg_password').value;
  const apiKey      = document.getElementById('cfg_apiKey').value.trim();
  const projectId   = document.getElementById('cfg_projectId').value.trim();
  const databaseURL = document.getElementById('cfg_dbUrl').value.trim();
  const appId       = document.getElementById('cfg_appId').value.trim();

  if (!apiKey || !projectId || !databaseURL || !rawPassword) {
    alert('Заполни все поля кроме App ID'); return;
  }
  if (rawPassword.length < 8) {
    alert('Пароль должен быть не менее 8 символов'); return;
  }

  // Store only the hash — never the raw password
  const passwordHash = await hashStr(rawPassword);
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    apiKey, projectId, databaseURL,
    appId: appId || 'placeholder',
    passwordHash,              // raw password never stored
  }));
  location.reload();
};

// ══════════════════════════════════════════════
// BRUTE-FORCE GUARD
// ══════════════════════════════════════════════
function getLockout() {
  try { return JSON.parse(sessionStorage.getItem(LOCKOUT_KEY)) || { n: 0, until: 0 }; } catch { return { n: 0, until: 0 }; }
}
function setLockout(s) { sessionStorage.setItem(LOCKOUT_KEY, JSON.stringify(s)); }

// ══════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════
window.checkPassword = function() {
  const lo   = getLockout();
  const now  = Date.now();
  const errEl = document.getElementById('lockError');
  const inEl  = document.getElementById('passwordInput');

  if (now < lo.until) {
    const s = Math.ceil((lo.until - now) / 1000);
    errEl.textContent = `Слишком много попыток. Подождите ${s} сек.`;
    errEl.classList.add('visible');
    return;
  }

  const input = inEl.value;
  if (!input) return;

  hashStr(input).then(h => {
    // support old config (plain password) and new (passwordHash)
    const check = chatConfig.passwordHash
      ? Promise.resolve(chatConfig.passwordHash)
      : hashStr(chatConfig.password || '');

    check.then(ch => {
      if (h === ch) {
        setLockout({ n: 0, until: 0 });
        // Derive encryption key from raw password input (never stored)
        deriveKey(input, chatConfig.projectId).then(k => {
          cryptoKey = k;
          const saved     = sessionStorage.getItem(SESSION_KEY);
          const savedTime = parseInt(sessionStorage.getItem(SESSION_KEY + '_t') || '0');
          if (saved && (now - savedTime) < SESSION_TTL) {
            myName = saved; showChat();
          } else {
            sessionStorage.removeItem(SESSION_KEY);
            document.getElementById('lockScreen').style.display = 'none';
            document.getElementById('nameScreen').style.display = 'flex';
            setTimeout(() => document.getElementById('nameInput').focus(), 100);
          }
        });
      } else {
        const n2 = lo.n + 1;
        const until2 = n2 >= MAX_ATTEMPTS ? now + LOCKOUT_MS : 0;
        setLockout({ n: n2, until: until2 });
        inEl.classList.add('error');
        const left = MAX_ATTEMPTS - n2;
        errEl.textContent = until2
          ? 'Заблокировано на 5 минут'
          : `Неверный пароль${left > 0 ? ` (попыток осталось: ${left})` : ''}`;
        errEl.classList.add('visible');
        inEl.value = '';
        setTimeout(() => {
          inEl.classList.remove('error');
          errEl.classList.remove('visible');
          errEl.textContent = 'Неверный пароль';
        }, 3000);
      }
    });
  });
};

window.enterChat = function() {
  const raw  = document.getElementById('nameInput').value.trim();
  const name = raw.replace(/[<>"'&]/g, '').slice(0, 20);
  if (!name) return;
  myName = name;
  sessionStorage.setItem(SESSION_KEY, name);
  sessionStorage.setItem(SESSION_KEY + '_t', Date.now().toString());
  showChat();
};

// ══════════════════════════════════════════════
// CHAT INIT
// ══════════════════════════════════════════════
function showChat() {
  document.getElementById('nameScreen').style.display = 'none';
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('chatScreen').style.display = 'flex';
  document.getElementById('headerUser').textContent = myName;
  initFirebaseChat();
}

function initFirebaseChat() {
  const app = initializeApp({
    apiKey: chatConfig.apiKey, projectId: chatConfig.projectId,
    databaseURL: chatConfig.databaseURL, appId: chatConfig.appId,
    authDomain: `${chatConfig.projectId}.firebaseapp.com`,
  });
  db = getDatabase(app);

  // Presence
  const presRef = ref(db, `presence/${myName.replace(/\W/g,'_')}`);
  set(presRef, { online: true, name: myName });
  onDisconnect(presRef).remove();
  onValue(ref(db, 'presence'), snap => {
    const count = snap.exists() ? Object.keys(snap.val()).length : 0;
    const statusEl = document.getElementById('connStatus');
    statusEl.classList.toggle('online', count > 0);
    document.getElementById('connText').textContent =
      count < 1 ? 'нет подключений' : `онлайн: ${count}`;
  });

  // Messages
  let firstLoad = true;
  const msgsRef = ref(db, 'messages');
  onChildAdded(msgsRef,   snap => renderMessage(snap.key, snap.val(), firstLoad));
  onChildChanged(msgsRef, snap => updateMessageDOM(snap.key, snap.val()));
  onChildRemoved(msgsRef, snap => {
    const el = document.getElementById(`msg-${snap.key}`);
    if (el) el.remove();
  });
  setTimeout(() => { firstLoad = false; scrollToBottom(); }, 600);
  document.getElementById('msgInput').focus();

  // Session expiry check
  setInterval(() => {
    const t = parseInt(sessionStorage.getItem(SESSION_KEY + '_t') || '0');
    if (t && Date.now() - t > SESSION_TTL) {
      sessionStorage.clear();
      alert('Сессия истекла. Войдите снова.');
      location.reload();
    }
  }, 60_000);
}

// ══════════════════════════════════════════════
// RENDER  (decrypt on arrival)
// ══════════════════════════════════════════════
async function renderMessage(key, msg, instant) {
  if (document.getElementById(`msg-${key}`)) return;
  const container = document.getElementById('messages');

  if (msg.type === 'system') {
    const el = document.createElement('div');
    el.className = 'system-msg'; el.id = `msg-${key}`;
    el.textContent = msg.text;   // system msgs not encrypted
    container.appendChild(el);
    if (!instant) scrollToBottom();
    return;
  }

  // Decrypt text
  let plainText = '';
  if (msg.deleted) {
    plainText = '';
  } else if (msg.text) {
    plainText = await decrypt(msg.text);
  }

  // Decrypt image
  let plainImage = null;
  if (msg.image && !msg.deleted) {
    plainImage = await decrypt(msg.image);
  }

  // Decrypt name
  let senderName = msg.name;
  try { senderName = await decrypt(msg.name); } catch {}

  const mine = senderName === myName;
  const wrap = document.createElement('div');
  wrap.className = `msg ${mine ? 'mine' : 'theirs'}`;
  wrap.id = `msg-${key}`;
  wrap.dataset.key  = key;
  wrap.dataset.mine = mine ? '1' : '0';
  // Store decrypted text for edit re-use
  wrap.dataset.plain = plainText;

  if (mine) {
    const actions = document.createElement('div');
    actions.className = 'msg-actions';
    const editBtn = document.createElement('button');
    editBtn.className = 'action-btn';
    editBtn.textContent = '✏ изм';
    editBtn.addEventListener('click', () => startEdit(key));
    const delBtn = document.createElement('button');
    delBtn.className = 'action-btn del';
    delBtn.textContent = '✕ удал';
    delBtn.addEventListener('click', () => deleteMsg(key));
    actions.appendChild(editBtn);
    actions.appendChild(delBtn);
    wrap.appendChild(actions);
  }

  const nameEl = document.createElement('div');
  nameEl.className = 'msg-name';
  nameEl.textContent = senderName;
  wrap.appendChild(nameEl);

  if (plainImage) {
    const img = document.createElement('img');
    img.className = 'msg-img'; img.src = plainImage;
    img.onclick = () => openViewer(plainImage);
    wrap.appendChild(img);
  }

  const textEl = document.createElement('div');
  textEl.className = `msg-text${msg.deleted ? ' deleted-text' : ''}`;
  textEl.textContent = msg.deleted ? 'Сообщение удалено' : plainText;
  wrap.appendChild(textEl);

  const footer = document.createElement('div');
  footer.className = 'msg-footer';
  if (msg.edited && !msg.deleted) {
    const editedEl = document.createElement('span');
    editedEl.className = 'msg-edited'; editedEl.textContent = 'изменено';
    footer.appendChild(editedEl);
  }
  const timeEl = document.createElement('div');
  timeEl.className = 'msg-time';
  timeEl.textContent = new Date(msg.timestamp || Date.now())
    .toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
  footer.appendChild(timeEl);
  wrap.appendChild(footer);

  if (mine) {
    wrap.addEventListener('touchstart', () => {
      longPressTimer = setTimeout(() => toggleActions(wrap), 500);
    }, { passive: true });
    wrap.addEventListener('touchend',  () => clearTimeout(longPressTimer));
    wrap.addEventListener('touchmove', () => clearTimeout(longPressTimer));
    wrap.addEventListener('click', e => {
      if (!e.target.classList.contains('action-btn')) hideAllActions();
    });
  }

  container.appendChild(wrap);
  if (!instant) scrollToBottom();
}

async function updateMessageDOM(key, msg) {
  const el = document.getElementById(`msg-${key}`);
  if (!el) return;
  const textEl = el.querySelector('.msg-text');
  if (textEl) {
    let plain = '';
    if (!msg.deleted && msg.text) plain = await decrypt(msg.text);
    textEl.textContent = msg.deleted ? 'Сообщение удалено' : plain;
    textEl.className = `msg-text${msg.deleted ? ' deleted-text' : ''}`;
    el.dataset.plain = plain;
  }
  const footer = el.querySelector('.msg-footer');
  if (footer && msg.edited && !msg.deleted) {
    if (!footer.querySelector('.msg-edited')) {
      const editedEl = document.createElement('span');
      editedEl.className = 'msg-edited'; editedEl.textContent = 'изменено';
      footer.insertBefore(editedEl, footer.firstChild);
    }
  }
}

function toggleActions(wrap) {
  hideAllActions();
  wrap.querySelector('.msg-actions')?.classList.toggle('visible');
}
function hideAllActions() {
  document.querySelectorAll('.msg-actions.visible').forEach(a => a.classList.remove('visible'));
}

// ══════════════════════════════════════════════
// SEND  (encrypt before push)
// ══════════════════════════════════════════════
window.sendMessage = async function() {
  const input = document.getElementById('msgInput');
  const raw   = input.value.trim();
  if (!db || !raw || !cryptoKey) return;

  const now = Date.now();
  if (now - lastSendTime < SEND_COOLDOWN) return;
  lastSendTime = now;

  const text = raw.slice(0, MSG_MAX_LEN);
  const encText = await encrypt(text);
  const encName = await encrypt(myName);

  if (editingKey) {
    update(ref(db, `messages/${editingKey}`), { text: encText, edited: true });
    cancelEdit();
    return;
  }

  push(ref(db, 'messages'), {
    name: encName, text: encText, timestamp: now, type: 'message'
  });
  input.value = ''; input.style.height = 'auto'; input.focus();
};

// ══════════════════════════════════════════════
// EDIT / DELETE
// ══════════════════════════════════════════════
window.startEdit = function(key) {
  hideAllActions();
  const el = document.getElementById(`msg-${key}`);
  if (!el || el.dataset.mine !== '1') return;
  const plain = el.dataset.plain || '';
  if (!plain) return;
  editingKey = key;
  const input = document.getElementById('msgInput');
  input.value = plain; input.focus();
  autoResize(input);
  document.getElementById('editBanner').classList.add('visible');
};

window.cancelEdit = function() {
  editingKey = null;
  document.getElementById('msgInput').value = '';
  document.getElementById('msgInput').style.height = 'auto';
  document.getElementById('editBanner').classList.remove('visible');
};

window.deleteMsg = function(key) {
  hideAllActions();
  const el = document.getElementById(`msg-${key}`);
  if (!el || el.dataset.mine !== '1') return;
  update(ref(db, `messages/${key}`), { text: '', deleted: true, image: null });
};

// ══════════════════════════════════════════════
// IMAGES  (encrypt before push)
// ══════════════════════════════════════════════
const ALLOWED_IMG = ['image/jpeg','image/png','image/gif','image/webp'];

window.handleImage = function(e) {
  const file = e.target.files[0];
  if (!file || !db || !cryptoKey) return;
  if (!ALLOWED_IMG.includes(file.type)) {
    alert('Разрешены только JPG, PNG, GIF, WebP'); e.target.value = ''; return;
  }
  if (file.size > 800_000) {
    alert('Изображение слишком большое. Максимум ~800 КБ.'); e.target.value = ''; return;
  }
  const reader = new FileReader();
  reader.onload = async ev => {
    const encImg  = await encrypt(ev.target.result);
    const encName = await encrypt(myName);
    push(ref(db, 'messages'), {
      name: encName, image: encImg, timestamp: Date.now(), type: 'message', text: ''
    });
  };
  reader.readAsDataURL(file);
  e.target.value = '';
};

window.openViewer = function(src) {
  document.getElementById('viewerImg').src = src;
  document.getElementById('imgViewer').classList.add('open');
};
window.closeViewer = function() {
  document.getElementById('imgViewer').classList.remove('open');
};

// ══════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════
window.handleKey = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
};
window.autoResize = function(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
};
function scrollToBottom() {
  const c = document.getElementById('messages');
  c.scrollTop = c.scrollHeight;
}

// ══════════════════════════════════════════════
// THEME SYSTEM
// ══════════════════════════════════════════════
const THEME_KEY = 'chatTheme_v1';

const DEFAULT_THEME = {
  '--bg': '#0d0d0d', '--surface': '#161616', '--border': '#2a2a2a',
  '--accent': '#e8ff00', '--accent-dim': '#b8cc00', '--text': '#e8e8e8',
  '--text-muted': '#666', '--msg-mine': '#1a1f00', '--msg-theirs': '#1a1a1a',

const PRESETS = [
  { name:'Лайм',     bg:'#0d0d0d', surface:'#161616', border:'#2a2a2a', accent:'#e8ff00', text:'#e8e8e8', muted:'#666',    mine:'#1a1f00', theirs:'#1a1a1a' },
  { name:'Киберпанк',bg:'#0a001f', surface:'#120030', border:'#3a0070', accent:'#bf00ff', text:'#eeddff', muted:'#7055aa', mine:'#1a0040', theirs:'#160028' },
  { name:'Матрица',  bg:'#000d00', surface:'#001500', border:'#003300', accent:'#00ff41', text:'#aaffaa', muted:'#336633', mine:'#002200', theirs:'#001200' },
  { name:'Закат',    bg:'#0f0a0a', surface:'#1a1010', border:'#3a2020', accent:'#ff6b35', text:'#f5e6e0', muted:'#885555', mine:'#2a1000', theirs:'#1a1212' },
  { name:'Океан',    bg:'#040d14', surface:'#091824', border:'#0d3050', accent:'#00c8ff', text:'#d0eeff', muted:'#3366aa', mine:'#001830', theirs:'#060f1a' },
  { name:'Розовый',  bg:'#0f0a10', surface:'#1a0f1e', border:'#3a1a44', accent:'#ff69b4', text:'#ffe0f0', muted:'#884466', mine:'#2a0020', theirs:'#160d18' },
  { name:'Золото',   bg:'#0d0b00', surface:'#1a1500', border:'#3a3000', accent:'#ffd700', text:'#fff8d0', muted:'#887700', mine:'#1f1800', theirs:'#151200' },
  { name:'Снег',     bg:'#f0f2f5', surface:'#ffffff', border:'#dde1e8', accent:'#4361ee', text:'#1a1a2e', muted:'#8898aa', mine:'#dde9ff', theirs:'#ffffff' },
];

const ACCENT_PALETTE = [
  '#e8ff00','#00ff41','#00c8ff','#ff6b35','#bf00ff',
  '#ff69b4','#ffd700','#ff4444','#00ffcc','#ff8c00',
  '#4361ee','#7fff00','#ff1493','#00bfff','#ff6347',
  '#adff2f','#da70d6','#40e0d0','#ff69b4','#1e90ff',
];

let pendingTheme = {};

function loadAndApplyTheme() {
  try {
    const saved = JSON.parse(localStorage.getItem(THEME_KEY));
    if (saved) applyThemeVars(saved);
  } catch {}
}

function applyThemeVars(vars) {
  for (const [k, v] of Object.entries(vars))
    document.documentElement.style.setProperty(k, v);
}

function darken(hex, factor = 0.75) {
  hex = hex.replace('#','');
  if (hex.length === 3) hex = hex.split('').map(c=>c+c).join('');
  const n = parseInt(hex, 16);
  const d = v => Math.max(0, Math.floor(((n>>v)&255)*factor)).toString(16).padStart(2,'0');
  return '#' + d(16) + d(8) + d(0);
}

function mixColors(hex1, hex2, t = 0.15) {
  const p = h => { h=h.replace('#',''); if(h.length===3)h=h.split('').map(c=>c+c).join(''); const n=parseInt(h,16); return [(n>>16)&255,(n>>8)&255,n&255]; };
  const [r1,g1,b1]=p(hex1), [r2,g2,b2]=p(hex2);
  const m = v => Math.floor(v).toString(16).padStart(2,'0');
  return '#'+m(r1*(1-t)+r2*t)+m(g1*(1-t)+g2*t)+m(b1*(1-t)+b2*t);
}

function buildThemeFromPreset(p) {
  return {
    '--bg':p.bg,'--surface':p.surface,'--border':p.border,
    '--accent':p.accent,'--accent-dim':darken(p.accent,0.78),
    '--text':p.text,'--text-muted':p.muted,
    '--msg-mine':p.mine,'--msg-theirs':p.theirs,
  };
}

function setPendingTheme(vars) {
  pendingTheme = {...vars};
  applyThemeVars(vars);
  updatePickerUI(vars);
  updatePreviewBar(vars);
}

function updatePickerUI(vars) {
  [['pick_bg','dot_bg','--bg'],['pick_surface','dot_surface','--surface'],
   ['pick_accent','dot_accent','--accent'],['pick_text','dot_text','--text'],
   ['pick_border','dot_border','--border']].forEach(([hId,dId,k]) => {
    const v = vars[k]||'';
    const h = document.getElementById(hId); if(h) h.value=v;
    const d = document.getElementById(dId); if(d) d.style.background=v;
  });
}

function updatePreviewBar(vars) {
  const ad=document.getElementById('previewAccentDot');
  const bm=document.getElementById('previewMine');
  const bt=document.getElementById('previewTheirs');
  if(ad) ad.style.background=vars['--accent']||'';
  if(bm){bm.style.background=vars['--msg-mine']||'';bm.style.borderColor=vars['--border']||'';}
  if(bt){bt.style.background=vars['--msg-theirs']||'';bt.style.borderColor=vars['--border']||'';}
}

function buildPresetCards() {
  const c = document.getElementById('themePresets'); c.innerHTML='';
  PRESETS.forEach(p => {
    const card = document.createElement('div');
    card.className='theme-preset'; card.style.background=p.bg;
    card.innerHTML=`<div class="theme-preset-preview">
      <div class="tp-bar" style="background:${p.surface};border:1px solid ${p.border}"></div>
      <div class="tp-msg" style="background:${p.mine};border:1px solid ${p.border}"></div>
      <div class="tp-msg2" style="background:${p.theirs};border:1px solid ${p.border}"></div>
      <div class="tp-bar" style="background:${p.accent};width:40%;border-radius:2px;margin-top:2px;opacity:1"></div>
    </div><div class="theme-preset-name" style="color:${p.muted}">${p.name}</div>`;
    card.onclick=()=>{
      document.querySelectorAll('.theme-preset').forEach(c=>c.classList.remove('active'));
      card.classList.add('active');
      setPendingTheme(buildThemeFromPreset(p));
    };
    c.appendChild(card);
  });
}

function buildAccentPalette() {
  const c = document.getElementById('accentPalette'); c.innerHTML='';
  ACCENT_PALETTE.forEach(color => {
    const dot=document.createElement('div');
    dot.className='palette-dot'; dot.style.background=color; dot.title=color;
    dot.onclick=()=>{
      document.querySelectorAll('.palette-dot').forEach(d=>d.classList.remove('selected'));
      dot.classList.add('selected');
      const base={...pendingTheme};
      base['--accent']=color; base['--accent-dim']=darken(color,0.78);
      base['--msg-mine']=mixColors(base['--bg']||DEFAULT_THEME['--bg'],color,0.12);
      setPendingTheme(base);
    };
    c.appendChild(dot);
  });
}

window.openThemePanel = function() {
  const current={};
  const root=getComputedStyle(document.documentElement);
  for(const k of Object.keys(DEFAULT_THEME))
    current[k]=root.getPropertyValue(k).trim()||DEFAULT_THEME[k];
  pendingTheme={...current};
  buildPresetCards(); buildAccentPalette();
  updatePickerUI(current); updatePreviewBar(current);
  document.getElementById('themePanel').classList.add('open');
};

window.handleThemePanelClick = function(e) {
  if(e.target===document.getElementById('themePanel')) closeThemePanel();
};

function closeThemePanel() {
  document.getElementById('themePanel').classList.remove('open');
}

window.applyAndClose = function() {
  localStorage.setItem(THEME_KEY, JSON.stringify(pendingTheme));
  closeThemePanel();
};

window.resetTheme = function() {
  setPendingTheme(DEFAULT_THEME);
  localStorage.removeItem(THEME_KEY);
  document.querySelectorAll('.theme-preset').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.palette-dot').forEach(d=>d.classList.remove('selected'));
};

window.onColorPick = function(input, varName, hexId, dotId) {
  const val=input.value;
  document.getElementById(hexId).value=val;
  document.getElementById(dotId).style.background=val;
  const updated={...pendingTheme,[varName]:val};
  if(varName==='--accent'){
    updated['--accent-dim']=darken(val,0.78);
    updated['--msg-mine']=mixColors(updated['--bg']||DEFAULT_THEME['--bg'],val,0.12);
  }
  setPendingTheme(updated);
};

window.onHexInput = function(input, varName) {
  const val=input.value;
  if(/^#[0-9a-fA-F]{6}$/.test(val)){
    const dotId='dot_'+varName.replace('--','').replace(/-/g,'');
    const dotEl=document.getElementById(dotId); if(dotEl) dotEl.style.background=val;
    const updated={...pendingTheme,[varName]:val};
    if(varName==='--accent'){
      updated['--accent-dim']=darken(val,0.78);
      updated['--msg-mine']=mixColors(updated['--bg']||DEFAULT_THEME['--bg'],val,0.12);
    }
    setPendingTheme(updated);
  }
};

loadAndApplyTheme();

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
chatConfig = loadConfig();
if (!chatConfig) {
  document.getElementById('configNotice').style.display = 'flex';
} else {
  document.getElementById('configNotice').style.display = 'none';
  document.getElementById('lockScreen').style.display = 'flex';
  setTimeout(() => document.getElementById('passwordInput').focus(), 100);
}
</script>
